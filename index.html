<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>旅遊分帳</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="" />
  <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700;900&family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['"Zen Maru Gothic"', '"Noto Sans TC"', 'system-ui', 'sans-serif'] },
          colors: {
            // 主色：莫蘭迪抹茶／苔綠（取代原本的藍）
            blue:    { 50:'#F0F2EC', 100:'#E1E6D8', 200:'#C9D2BB', 300:'#ABB899', 400:'#8E9E78', 500:'#77875F', 600:'#616F4D', 700:'#4C583D', 800:'#3A4430', 900:'#2C3325' },
            // 中性：暖米灰／大地色
            gray:    { 50:'#FAF7F1', 100:'#F3EEE5', 200:'#E7DFD2', 300:'#D8CDBB', 400:'#B9AC98', 500:'#94897A', 600:'#736A5D', 700:'#565044', 800:'#3E3930', 900:'#2C2823' },
            // 磚紅（刪除等）
            red:     { 50:'#F6EDE9', 100:'#EBD9D0', 200:'#DCBDAE', 300:'#C99C87', 400:'#C08267', 500:'#B06B50', 600:'#965740', 700:'#784634' },
            // 柔綠（成功／進行中）
            green:   { 50:'#EDF1EA', 100:'#DBE4D3', 200:'#BFCEB0', 300:'#9DB388', 400:'#85A06E', 500:'#6E8B58', 600:'#587046', 700:'#465837' },
            emerald: { 50:'#EDF1EA', 100:'#DBE4D3', 200:'#BFCEB0', 300:'#9DB388', 400:'#85A06E', 500:'#6E8B58', 600:'#587046', 700:'#465837' },
            // 霧藍（消費／行程時間）
            sky:     { 50:'#EBF0F2', 100:'#D6E1E7', 200:'#B4C8D1', 300:'#8FACB8', 400:'#7695A4', 500:'#5E7F90', 600:'#4C6777', 700:'#3D525E' },
            orange:  { 50:'#F6F1E8', 100:'#EBE1CC', 200:'#DBC8A2', 300:'#CBAE78', 400:'#C0975A', 500:'#A9843F', 600:'#8C6C34' },
            amber:   { 50:'#F6F1E8', 100:'#EBE1CC', 200:'#DBC8A2', 300:'#CBAE78', 400:'#C0975A', 500:'#A9843F', 600:'#8C6C34' },
            pink:    { 50:'#F4ECEF', 100:'#E8D8DF', 200:'#D6BAC6', 300:'#C398AA', 400:'#B78096', 500:'#A66980', 600:'#8B5568' }
          },
          borderRadius: { lg:'0.75rem', xl:'1.1rem', '2xl':'1.5rem', '3xl':'2rem' },
          boxShadow: {
            sm: '0 1px 2px 0 rgba(87,80,68,0.05)',
            DEFAULT: '0 1px 3px 0 rgba(87,80,68,0.07)',
            md: '0 6px 16px -4px rgba(87,80,68,0.10)',
            lg: '0 12px 28px -6px rgba(87,80,68,0.12)',
            xl: '0 20px 40px -10px rgba(87,80,68,0.14)',
            '2xl': '0 28px 56px -14px rgba(87,80,68,0.18)'
          }
        }
      }
    };
  </script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    body { -webkit-tap-highlight-color: transparent; font-family: "Zen Maru Gothic", "Noto Sans TC", system-ui, sans-serif; -webkit-font-smoothing: antialiased; letter-spacing: .01em; }
    input, select, textarea, button { font-family: inherit; }
    h1, h2, h3 { text-wrap: pretty; }
    .modal { display: none; align-items: center; justify-content: center; position: fixed; inset: 0; background: rgba(56,50,42,0.34); z-index: 50; backdrop-filter: blur(5px); padding: 1rem; }
    .modal.active { display: flex; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-thumb { background: #E0D6C6; border-radius: 10px; }
    .loading-overlay { display: none; }
    .loading-overlay.active { display: flex; position: absolute; inset: 0; background: rgba(250,247,241,0.78); align-items: center; justify-content: center; z-index: 20; border-radius: 1.1rem; }
    [x-hidden] { display: none !important; }
    .pagetab, #currentTripName, .listtab { white-space: nowrap; }
    a { color: #77875F; }
    a:hover { color: #616F4D; }
    .leaflet-popup-content-wrapper { border-radius: 14px; }
  </style>
</head>
<body class="bg-[#F5F1E8] text-[#565044] font-bold min-h-screen">

  <div id="mainApp" class="max-w-[480px] mx-auto px-4 pt-2 pb-28" x-hidden>
    <!-- Header (sticky) -->
    <div class="sticky top-0 z-30 -mx-4 px-4 py-2.5 bg-[#F5F1E8]/90 backdrop-blur mb-4 flex justify-center">
      <button onclick="window.openModal('tripModal')" title="更換帳本" class="flex items-center gap-2 text-[#77875F] hover:bg-blue-50 px-4 py-2 rounded-full border border-blue-100 transition-all bg-white shadow-sm">
        <i data-lucide="folder-open" class="w-4 h-4"></i>
        <span id="currentTripName" class="text-sm leading-none">載入中...</span>
        <i data-lucide="chevrons-up-down" class="w-3.5 h-3.5 text-blue-300"></i>
      </button>
    </div>

    <!-- 首頁目次 -->
    <div id="pageHome" x-hidden>
      <div class="bg-white rounded-2xl shadow-sm border border-[#E7DFD2] p-6 mb-5 overflow-hidden relative">
        <div class="flex justify-between items-start gap-4">
          <div class="min-w-0">
            <div class="text-[10px] text-blue-400 uppercase tracking-widest font-black mb-1">TRIP</div>
            <div id="homeDest" class="text-2xl font-black text-gray-800 truncate">—</div>
            <div id="homeDates" class="text-sm text-gray-400 font-bold mt-1">—</div>
          </div>
          <button onclick="window.openTripSettings()" title="旅程設定" class="shrink-0 text-gray-400 hover:text-blue-500 bg-gray-50 hover:bg-blue-50 p-2.5 rounded-lg transition-all"><i data-lucide="settings" class="w-5 h-5"></i></button>
        </div>
        <div id="homeCountdown" class="mt-5"></div>
        <div id="homeWeather" class="mt-5"></div>
        <div id="homeCalendar" class="mt-5"></div>
      </div>
      <div id="homeLodging" class="mb-5"></div>
      <div id="homeTiles" class="grid grid-cols-2 sm:grid-cols-3 gap-3"></div>
    </div>

    <div id="tripContent" x-hidden class="grid grid-cols-1 gap-5">
      <div class="space-y-6">
        <!-- 成員 -->
        <div class="bg-white p-6 rounded-xl shadow-sm border border-[#E7DFD2]">
          <div class="flex items-center justify-between mb-4">
            <div class="flex items-center gap-2 text-gray-500"><i data-lucide="users" class="w-4 h-4"></i><h2>成員名單</h2></div>
            <button onclick="window.openModal('ratesModal')" class="text-blue-500 hover:text-blue-600 flex items-center gap-1 text-xs">
              <i data-lucide="settings-2" class="w-3.5 h-3.5"></i> 匯率管理
            </button>
          </div>
          <div id="peopleList" class="flex flex-wrap gap-2 mb-4"></div>
          <div class="flex gap-2">
            <input id="newPersonInput" type="text" placeholder="新成員名稱" onkeydown="if(event.key==='Enter')window.addPerson()" class="flex-1 border border-[#E7DFD2] rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-blue-400 bg-gray-50 font-bold" />
            <button onclick="window.addPerson()" title="新增成員" class="bg-white border border-[#E7DFD2] px-3 rounded-lg hover:bg-gray-50 text-gray-400"><i data-lucide="plus" class="w-4 h-4"></i></button>
          </div>
        </div>

        <!-- 結算轉帳 -->
        <div class="bg-white p-6 rounded-xl shadow-sm border border-[#E7DFD2]">
          <div class="flex justify-between items-center mb-4">
            <div class="flex items-center gap-2 text-gray-500"><i data-lucide="credit-card" class="w-4 h-4"></i><h2>結算轉帳</h2></div>
            <select id="settlementCurrency" onchange="window.refreshUI()" title="結算幣別" class="bg-gray-50 border border-gray-100 text-xs px-2 py-1 rounded-md font-bold outline-none cursor-pointer"></select>
          </div>
          <div id="transfersList" class="space-y-2"></div>
        </div>

        <!-- 總額彙整 -->
        <div class="bg-white p-6 rounded-xl shadow-sm border border-[#E7DFD2]">
          <div class="flex justify-between items-center mb-4">
            <div class="flex items-center gap-2 text-gray-500"><i data-lucide="file-text" class="w-4 h-4"></i><h2>總額彙整</h2></div>
            <select id="summaryCurrency" onchange="window.refreshUI()" title="彙整幣別" class="bg-gray-50 border border-gray-100 text-xs px-2 py-1 rounded-md font-bold outline-none cursor-pointer"></select>
          </div>
          <div id="summaryList" class="space-y-4"></div>
        </div>
      </div>

      <!-- 支出明細 -->
      <div class="space-y-6">
        <div class="bg-white p-6 rounded-xl shadow-sm border border-[#E7DFD2]">
          <div class="flex items-center justify-between mb-6">
            <div class="flex items-center gap-2 text-gray-500"><i data-lucide="receipt" class="w-4 h-4"></i><h2>支出明細</h2></div>
            <div class="flex items-center gap-2">
              <select id="monthFilter" onchange="window.setMonthFilter(this.value)" title="月份篩選" class="bg-gray-50 border border-gray-100 text-xs px-2 py-1 rounded-md font-bold outline-none cursor-pointer"></select>
              <div id="expenseCount" class="text-[10px] text-gray-400 bg-gray-50 px-2 py-1 rounded">共 0 筆</div>
            </div>
          </div>
          <div id="expenseList" class="space-y-4"></div>
        </div>
      </div>
    </div>

    <!-- 航班頁面 -->
    <div id="flightsContent" x-hidden class="max-w-2xl mx-auto">
      <div class="flex items-center justify-between mb-6 px-1">
        <div>
          <h1 class="text-2xl font-black text-gray-700">航班</h1>
          <p id="flightsSubtitle" class="text-sm text-gray-400 font-bold mt-1"></p>
        </div>
        <select id="flightMemberFilter" onchange="window.renderFlights()" title="成員篩選" class="bg-white border border-gray-100 shadow-sm text-xs px-3 py-2 rounded-lg font-bold outline-none cursor-pointer"></select>
      </div>
      <div id="flightsList" class="space-y-5"></div>
    </div>

    <!-- 行程頁面 -->
    <div id="pageItinerary" x-hidden>
      <div id="itinCountdown" class="mb-5"></div>
      <div id="itineraryList" class="space-y-6"></div>
    </div>

    <!-- 地圖頁面 -->
    <div id="pageMap" x-hidden>
      <div class="flex items-center justify-between mb-3">
        <div class="flex items-center gap-2 text-gray-500"><i data-lucide="map" class="w-4 h-4"></i><h2 class="font-black">地圖</h2></div>
        <select id="mapDateFilter" onchange="window.setMapDate(this.value)" title="日期篩選" class="bg-white border border-gray-100 shadow-sm text-xs px-3 py-2 rounded-lg font-bold outline-none cursor-pointer"></select>
      </div>
      <div id="mapLayerChips" class="grid grid-cols-3 gap-2 mb-4"></div>
      <div id="mapView" class="w-full h-[60vh] min-h-[400px] rounded-2xl overflow-hidden border border-gray-100 shadow-sm z-0"></div>
      <p id="mapEmpty" class="text-center text-xs text-gray-300 font-bold mt-3"></p>
    </div>

    <!-- 清單頁面 -->
    <div id="pageLists" x-hidden class="max-w-2xl mx-auto">
      <div class="flex gap-2 mb-5">
        <button id="listTabWish" onclick="window.setListType('wish')" class="listtab flex-1 px-4 py-2.5 rounded-lg text-sm font-black flex items-center justify-center gap-1.5 transition-all"><i data-lucide="sparkles" class="w-4 h-4"></i>願望清單</button>
        <button id="listTabBuy" onclick="window.setListType('buy')" class="listtab flex-1 px-4 py-2.5 rounded-lg text-sm font-black flex items-center justify-center gap-1.5 transition-all"><i data-lucide="shopping-bag" class="w-4 h-4"></i>必買清單</button>
      </div>
      <div class="bg-white rounded-2xl shadow-sm border border-[#E7DFD2] p-4 mb-4">
        <div class="flex gap-2">
          <input id="newListInput" type="text" placeholder="新增項目…" onkeydown="if(event.key==='Enter')window.addListItem()" class="flex-1 border border-gray-200 rounded-lg px-3 py-2.5 text-sm bg-gray-50 font-bold outline-none focus:border-blue-400" />
          <select id="newListMember" title="誰的" class="border border-gray-200 rounded-lg px-2 text-xs bg-gray-50 font-bold outline-none cursor-pointer max-w-[90px]"></select>
          <button onclick="window.addListItem()" title="新增" class="bg-[#77875F] text-white px-4 rounded-lg hover:bg-blue-600 shrink-0"><i data-lucide="plus" class="w-4 h-4"></i></button>
        </div>
      </div>
      <div id="listProgress" class="mb-3"></div>
      <div id="listItems" class="space-y-2"></div>
    </div>

    <!-- 匯率頁面 -->
    <div id="pageRates" x-hidden class="max-w-lg mx-auto">
      <div class="bg-white rounded-2xl shadow-sm border border-[#E7DFD2] p-6">
        <div class="flex items-center justify-between mb-1">
          <div class="flex items-center gap-2 text-gray-500"><i data-lucide="arrow-right-left" class="w-4 h-4"></i><h2 class="font-black">即時匯率換算</h2></div>
          <button onclick="window.loadLiveRates(true)" title="重新整理" class="text-blue-500 hover:text-blue-600 flex items-center gap-1 text-xs"><i data-lucide="refresh-cw" class="w-3.5 h-3.5"></i>更新</button>
        </div>
        <p id="rateUpdated" class="text-[10px] text-gray-400 font-bold mb-5">載入中…</p>

        <div class="space-y-3">
          <div class="flex gap-2">
            <input id="convFromAmt" type="number" value="1000" oninput="window.convert('from')" class="flex-1 border border-gray-200 rounded-xl p-3 bg-gray-50 outline-none text-lg font-black focus:border-blue-400" />
            <select id="convFrom" onchange="window.convert('from')" class="border border-gray-200 rounded-xl px-3 bg-gray-50 font-black outline-none cursor-pointer"></select>
          </div>
          <div class="flex justify-center"><i data-lucide="arrow-down" class="w-5 h-5 text-blue-300"></i></div>
          <div class="flex gap-2">
            <input id="convToAmt" type="number" oninput="window.convert('to')" class="flex-1 border border-gray-200 rounded-xl p-3 bg-blue-50 outline-none text-lg font-black text-blue-600 focus:border-blue-400" />
            <select id="convTo" onchange="window.convert('from')" class="border border-gray-200 rounded-xl px-3 bg-gray-50 font-black outline-none cursor-pointer"></select>
          </div>
        </div>

        <div id="rateQuickTable" class="mt-6 pt-5 border-t border-gray-50 space-y-2"></div>

        <button onclick="window.applyLiveRatesToTrip()" class="w-full mt-6 bg-gray-50 hover:bg-blue-50 text-blue-500 border border-blue-100 py-3 rounded-xl font-black text-sm flex items-center justify-center gap-2 transition-all"><i data-lucide="download" class="w-4 h-4"></i>套用即時匯率到此帳本記帳</button>
      </div>
    </div>
    <!-- FAB 新增 -->
    <div class="fixed bottom-0 left-0 right-0 z-40 pointer-events-none">
      <div class="max-w-[480px] mx-auto relative h-0">
        <button id="addExpenseBtn" onclick="window.openAddExpense()" title="新增支出" class="pointer-events-auto absolute right-4 bottom-[80px] w-14 h-14 rounded-full bg-[#77875F] text-white shadow-xl flex items-center justify-center active:scale-95"><i data-lucide="plus" class="w-6 h-6"></i></button>
        <button id="addFlightBtn" onclick="window.openAddFlight()" x-hidden title="新增航班" class="pointer-events-auto absolute right-4 bottom-[80px] w-14 h-14 rounded-full bg-[#77875F] text-white shadow-xl flex items-center justify-center active:scale-95"><i data-lucide="plus" class="w-6 h-6"></i></button>
        <button id="addItinBtn" onclick="window.openAddItin()" x-hidden title="新增行程" class="pointer-events-auto absolute right-4 bottom-[80px] w-14 h-14 rounded-full bg-[#77875F] text-white shadow-xl flex items-center justify-center active:scale-95"><i data-lucide="plus" class="w-6 h-6"></i></button>
      </div>
    </div>

    <!-- 底部導覽 -->
    <nav class="fixed bottom-0 left-0 right-0 z-40 bg-white/95 backdrop-blur border-t border-gray-100 shadow-[0_-2px_12px_rgba(0,0,0,0.04)]">
      <div class="max-w-[480px] mx-auto flex">
        <button id="tab_home" onclick="window.setPage('home')" class="navbtn flex-1 flex flex-col items-center gap-0.5 py-2.5 text-gray-400"><i data-lucide="layout-grid" class="w-5 h-5"></i><span class="text-[10px] font-black">首頁</span></button>
        <button id="tab_trip" onclick="window.setPage('trip')" class="navbtn flex-1 flex flex-col items-center gap-0.5 py-2.5 text-gray-400"><i data-lucide="wallet" class="w-5 h-5"></i><span class="text-[10px] font-black">記帳</span></button>
        <button id="tab_flight" onclick="window.setPage('flight')" class="navbtn flex-1 flex flex-col items-center gap-0.5 py-2.5 text-gray-400"><i data-lucide="plane" class="w-5 h-5"></i><span class="text-[10px] font-black">航班</span></button>
        <button id="tab_itin" onclick="window.setPage('itin')" class="navbtn flex-1 flex flex-col items-center gap-0.5 py-2.5 text-gray-400"><i data-lucide="calendar-days" class="w-5 h-5"></i><span class="text-[10px] font-black">行程</span></button>
        <button id="tab_map" onclick="window.setPage('map')" class="navbtn flex-1 flex flex-col items-center gap-0.5 py-2.5 text-gray-400"><i data-lucide="map" class="w-5 h-5"></i><span class="text-[10px] font-black">地圖</span></button>
        <button id="tab_list" onclick="window.setPage('list')" class="navbtn flex-1 flex flex-col items-center gap-0.5 py-2.5 text-gray-400"><i data-lucide="check-square" class="w-5 h-5"></i><span class="text-[10px] font-black">清單</span></button>
        <button id="tab_rate" onclick="window.setPage('rate')" class="navbtn flex-1 flex flex-col items-center gap-0.5 py-2.5 text-gray-400"><i data-lucide="arrow-right-left" class="w-5 h-5"></i><span class="text-[10px] font-black">匯率</span></button>
      </div>
    </nav>
  </div>

  <!-- 帳本 Modal -->
  <div id="tripModal" class="modal">
    <div class="bg-white w-full max-w-sm rounded-2xl shadow-2xl border border-[#E7DFD2] overflow-hidden">
      <div class="p-5 border-b flex justify-between items-center bg-gray-50">
        <h2 id="tripModalTitle" class="text-base font-black text-gray-700">選擇帳本</h2>
        <button id="tripModalClose" onclick="window.closeModal('tripModal')" title="關閉"><i data-lucide="x" class="w-5 h-5"></i></button>
      </div>
      <p id="tripModalHint" class="px-6 pt-4 text-xs text-gray-400 font-bold">請選擇一個帳本進入，或在下方建立新帳本</p>
      <div class="p-6 pt-3 space-y-3 max-h-96 overflow-y-auto" id="tripsContainer"></div>
      <div class="p-6 border-t space-y-3">
        <input id="newTripInput" type="text" placeholder="新帳本名稱" class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm bg-gray-50 font-bold focus:outline-none focus:border-blue-400" />
        <div class="grid grid-cols-2 gap-2">
          <button onclick="window.createTripMode('simple')" class="flex flex-col items-center gap-1 py-3 rounded-xl border-2 border-gray-100 hover:border-blue-300 hover:bg-blue-50 transition-all">
            <i data-lucide="wallet" class="w-5 h-5 text-blue-500"></i>
            <span class="text-sm font-black text-gray-700">記帳帳本</span>
            <span class="text-[10px] text-gray-400 font-bold">分帳＋地點分布</span>
          </button>
          <button onclick="window.createTripMode('travel')" class="flex flex-col items-center gap-1 py-3 rounded-xl border-2 border-gray-100 hover:border-blue-300 hover:bg-blue-50 transition-all">
            <i data-lucide="palmtree" class="w-5 h-5 text-emerald-500"></i>
            <span class="text-sm font-black text-gray-700">旅遊帳本</span>
            <span class="text-[10px] text-gray-400 font-bold">行程／航班／清單…</span>
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- 匯率 Modal -->
  <div id="ratesModal" class="modal">
    <div class="bg-white w-full max-w-sm rounded-2xl shadow-2xl overflow-hidden">
      <div class="p-5 border-b flex justify-between items-center bg-gray-50">
        <h2 class="text-base font-black flex items-center gap-2 text-gray-700"><i data-lucide="settings-2" class="w-4 h-4"></i> 匯率管理</h2>
        <button onclick="window.closeModal('ratesModal')" title="關閉"><i data-lucide="x" class="w-5 h-5"></i></button>
      </div>
      <div class="p-6 space-y-5">
        <p class="text-[10px] text-gray-400 font-bold">設定每 1 單位外幣兌換多少 TWD</p>
        <div id="ratesList" class="space-y-4"></div>
        <button onclick="window.closeModal('ratesModal')" class="w-full bg-[#77875F] text-white py-3 rounded-xl font-black text-sm hover:bg-blue-600 shadow-lg">完成設定</button>
      </div>
    </div>
  </div>

  <!-- 新增/編輯支出 Modal -->
  <div id="addExpenseModal" class="modal !items-start sm:!items-center overflow-y-auto">
    <div class="bg-white w-full max-w-md rounded-2xl shadow-2xl my-4 overflow-hidden flex flex-col max-h-[94vh]">
      <div class="p-4 border-b flex justify-between items-center bg-gray-50 shrink-0">
        <h2 id="modalTitle" class="text-base font-black text-gray-700">新增支出</h2>

      travel: ['home', 'trip', 'flight', 'itin', 'map', 'list', 'rate']
    };

    // ===== state =====
    let isAuthed = false;
    let activeTripId = null;
    let trips = [];
    let people = [];
    let expenses = [];
    let rates = { ...DEFAULT_RATES };
    let expensesCache = {};
    let flights = [];
    let flightsCache = {};
    let tripMeta = {};
    let itinerary = [];
    let itineraryCache = {};
    let lists = [];
    let listsCache = {};
    let editingItinId = null;
    let listType = 'wish';
    let lodgingDraft = [];
    let liveRates = null;
    let mapLayerOn = {};
    let mapDate = 'all';
    let tripMode = 'travel';
    let pendingDefaultPage = false;
    let metaModeDraft = 'travel';
    // form state
    let editingId = null;
    let participants = [];
    let customAmounts = {};
    let previewUrl = null;
    let expandedTransferKey = null;
    let editingTripId = null;
    let selectedMonth = 'all';
    let currentView = 'list';
    let currentPage = 'trip';
    let editingFlightId = null;
    let map = null;
    let mapMarkers = [];
    // listeners
    let unsubSettings = null;
    let unsubExpenses = null;
    let unsubFlights = null;
    let unsubItin = null;
    let unsubLists = null;

    const $ = (id) => document.getElementById(id);
    const esc = (s) => String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    const icons = () => window.lucide && window.lucide.createIcons();

    function fillCurrencySelect(el, val) {
      el.innerHTML = CURRENCIES.map(c => `<option value="${c.code}">${c.code}</option>`).join('');
      el.value = val;
    }

    function init() {
      // populate static selects
      fillCurrencySelect($('settlementCurrency'), 'TWD');
      fillCurrencySelect($('summaryCurrency'), 'TWD');

      signInAnonymously(auth).catch(err => {
        console.error('驗證失敗', err);
        $('currentTripName').innerText = '登入失敗';
      });
      onAuthStateChanged(auth, (user) => {
        if (!user) return;
        isAuthed = true;
        const tripsRef = collection(db, 'artifacts', appId, 'public', 'data', 'trips_list');
        onSnapshot(tripsRef, (snap) => {
          trips = snap.docs.map(d => ({ id: d.id, ...d.data() }));
          renderTrips();
          // 起始畫面：尚未選帳本時，彈出帳本選擇頁（當作 landing）
          if (!activeTripId) {
            updateTripModalChrome();
            window.openModal('tripModal');
          }
        });
      });
    }

    function updateTripModalChrome() {
      const hasTrip = !!activeTripId;
      $('tripModalTitle').innerText = hasTrip ? '更換帳本' : '選擇帳本';
      $('tripModalClose').style.display = hasTrip ? '' : 'none';
      $('tripModalHint').style.display = hasTrip ? 'none' : '';
    }

    window.switchTrip = (id) => {
      if (!isAuthed) return;
      activeTripId = id;
      const trip = trips.find(t => t.id === id);
      $('currentTripName').innerText = trip ? trip.name : '未選取帳本';
      // 進入帳本內部頁面
      $('mainApp').removeAttribute('x-hidden');
      updateTripModalChrome();
      pendingDefaultPage = true;
      renderTrips();

      if (unsubSettings) unsubSettings();
      if (unsubExpenses) unsubExpenses();
      if (unsubFlights) unsubFlights();
      if (unsubItin) unsubItin();
      if (unsubLists) unsubLists();

      const settingsRef = doc(db, 'artifacts', appId, 'public', 'data', 'trip_settings', activeTripId);
      unsubSettings = onSnapshot(settingsRef, (d) => {
        if (d.exists()) {
          const data = d.data();
          people = Array.isArray(data.people) ? data.people : [];
          rates = data.rates ? { ...DEFAULT_RATES, ...data.rates } : { ...DEFAULT_RATES };
          tripMeta = data.meta || {};
        } else {
          people = []; rates = { ...DEFAULT_RATES }; tripMeta = {};
          setDoc(settingsRef, { people: [], rates: DEFAULT_RATES });
        }
        tripMode = tripMeta.mode || 'travel';
        applyMode();
        renderPeople();
        window.refreshUI();
        window.renderFlights();
        renderHome();
        renderItinerary();
        fetchWeather();
      });

      const expensesRef = collection(db, 'artifacts', appId, 'public', 'data', `expenses_${activeTripId}`);
      unsubExpenses = onSnapshot(expensesRef, (snap) => {
        expensesCache = {};
        expenses = snap.docs.map(d => {
          const data = { dbId: d.id, ...d.data() };
          expensesCache[d.id] = data;
          return data;
        });
        expenses.sort((a, b) => (b.date > a.date ? 1 : b.date < a.date ? -1 : (b.created_at || 0) - (a.created_at || 0)));
        window.refreshUI();
      });

      const flightsRef = collection(db, 'artifacts', appId, 'public', 'data', `flights_${activeTripId}`);
      unsubFlights = onSnapshot(flightsRef, (snap) => {
        flightsCache = {};
        flights = snap.docs.map(d => {
          const data = { dbId: d.id, ...d.data() };
          flightsCache[d.id] = data;
          return data;
        });
        flights.sort((a, b) => (a.date > b.date ? 1 : a.date < b.date ? -1 : (a.depTime > b.depTime ? 1 : -1)));
        window.renderFlights();
        renderHome();
      });

      const itinRef = collection(db, 'artifacts', appId, 'public', 'data', `itinerary_${activeTripId}`);
      unsubItin = onSnapshot(itinRef, (snap) => {
        itineraryCache = {};
        itinerary = snap.docs.map(d => { const data = { dbId: d.id, ...d.data() }; itineraryCache[d.id] = data; return data; });
        itinerary.sort((a, b) => (a.date > b.date ? 1 : a.date < b.date ? -1 : ((a.time || '') > (b.time || '') ? 1 : -1)));
        renderItinerary();
        renderHome();
        if (currentPage === 'map') renderMap();
      });

      const listsRef = collection(db, 'artifacts', appId, 'public', 'data', `lists_${activeTripId}`);
      unsubLists = onSnapshot(listsRef, (snap) => {
        listsCache = {};
        lists = snap.docs.map(d => { const data = { dbId: d.id, ...d.data() }; listsCache[d.id] = data; return data; });
        lists.sort((a, b) => (a.created_at || 0) - (b.created_at || 0));
        renderLists();
        renderHome();
      });
    };

    window.refreshUI = () => {
      renderExpenses();
      renderSummary();
      renderSettlement();
      if (currentView === 'map') renderMap();
      icons();
    };

    // ===== 頁面切換 =====
    const TAB_ON = 'navbtn flex-1 flex flex-col items-center gap-0.5 py-2.5 text-blue-500';
    const TAB_OFF = 'navbtn flex-1 flex flex-col items-center gap-0.5 py-2.5 text-gray-400';
    window.setPage = (p) => {
      if (!PAGE_MAP[p]) p = 'home';
      currentPage = p;
      Object.entries(PAGE_MAP).forEach(([key, cfg]) => {
        $(cfg.el).toggleAttribute('x-hidden', key !== p);
        $(cfg.tab).className = key === p ? TAB_ON : TAB_OFF;
        if (cfg.add) $(cfg.add).toggleAttribute('x-hidden', !(cfg.add && key === p));
      });
      if (p === 'home') renderHome();
      else if (p === 'flight') window.renderFlights();
      else if (p === 'itin') renderItinerary();
      else if (p === 'map') renderMap();
      else if (p === 'list') renderLists();
      else if (p === 'rate') renderRatesPage();
      icons();
    };

    // 依帳本模式顯示可用頁面
    function applyMode() {
      const allowed = MODE_PAGES[tripMode] || MODE_PAGES.travel;
      Object.entries(PAGE_MAP).forEach(([key, cfg]) => {
        $(cfg.tab).toggleAttribute('x-hidden', !allowed.includes(key));
      });
      if (pendingDefaultPage) {
        pendingDefaultPage = false;
        window.setPage(tripMode === 'simple' ? 'trip' : 'home');
      } else if (!allowed.includes(currentPage)) {
        window.setPage(allowed[0]);
      }
    }

    // ===== 航班 =====
    function calcDuration(dep, arr) {
      if (!dep || !arr) return '';
      const [dh, dm] = dep.split(':').map(Number);
      const [ah, am] = arr.split(':').map(Number);
      let mins = (ah * 60 + am) - (dh * 60 + dm);
      if (mins < 0) mins += 24 * 60;
      const h = Math.floor(mins / 60), m = mins % 60;
      return `${h}h${m ? ' ' + m + 'min' : ''}`;
    }
    const WD = ['日', '一', '二', '三', '四', '五', '六'];
    function fmtDate(d) {
      if (!d) return '';
      const dt = new Date(d + 'T00:00:00');
      return `${dt.getFullYear()}/${dt.getMonth() + 1}/${dt.getDate()} ${WD[dt.getDay()]}`;
    }

    window.renderFlights = () => {
      const filter = $('flightMemberFilter');
      const prevVal = filter.value || 'all';
      filter.innerHTML = `<option value="all">全部成員</option>` + people.map(p => `<option value="${esc(p)}">${esc(p)}</option>`).join('');
      filter.value = people.includes(prevVal) || prevVal === 'all' ? prevVal : 'all';
      const who = filter.value;

      const list = who === 'all' ? flights : flights.filter(f => f.member === who);
      const dirs = [...new Set(list.map(f => `${f.fromCode || ''}→${f.toCode || ''}`))];
      $('flightsSubtitle').innerText = list.length
        ? (who === 'all' ? `共 ${list.length} 段航班` : `${who} · ${list.length} 段航班`)
        : '尚無航班紀錄';

      $('flightsList').innerHTML = list.length ? list.map(f => {
        const dur = f.duration || calcDuration(f.depTime, f.arrTime);
        return `<div onclick="window.editFlight('${f.dbId}')" class="bg-white rounded-2xl shadow-sm border border-[#E7DFD2] p-6 cursor-pointer hover:shadow-md hover:border-blue-200 transition-all">
          <div class="flex justify-between items-center mb-5">
            <div class="flex items-center gap-2 text-sm font-black text-[#77875F]">
              <span>${esc(f.number || '航班')}</span>
              <span class="text-gray-300">·</span>
              <span class="text-gray-400 font-bold">${esc(f.direction || '')}</span>
              ${who === 'all' && f.member ? `<span class="bg-blue-50 text-blue-400 text-[10px] px-2 py-0.5 rounded-full">${esc(f.member)}</span>` : ''}
            </div>
            <span class="text-sm text-gray-400 font-bold">${esc(fmtDate(f.date))}</span>
          </div>
          <div class="flex items-center justify-between gap-3">
            <div class="text-4xl font-black text-gray-800 tracking-tight">${esc(f.fromCode || '—')}</div>
            <div class="flex-1 flex flex-col items-center">
              <span class="text-[11px] text-gray-400 font-bold mb-1">${esc(dur)}</span>
              <div class="w-full flex items-center gap-1 text-blue-300">
                <div class="flex-1 border-t border-dashed border-gray-200"></div>
                <i data-lucide="plane" class="w-4 h-4 text-blue-400"></i>
                <div class="flex-1 border-t border-dashed border-gray-200"></div>
              </div>
            </div>
            <div class="text-4xl font-black text-gray-800 tracking-tight">${esc(f.toCode || '—')}</div>
          </div>
          <div class="flex justify-between items-baseline mt-2">
            <div class="text-2xl font-black text-gray-700">${esc(f.depTime || '--:--')}</div>
            <div class="text-2xl font-black text-gray-700">${esc(f.arrTime || '--:--')}</div>
          </div>
          <div class="flex justify-between text-sm text-gray-400 font-bold mt-1">
            <span>${esc(f.fromName || '')}</span>
            <span>${esc(f.toName || '')}</span>
          </div>
          ${(f.airline || f.note || f.pnr) ? `<div class="flex items-center gap-3 mt-4 pt-4 border-t border-gray-50 text-sm text-gray-400 font-bold flex-wrap">
            ${f.airline ? `<span class="text-gray-500">${esc(f.airline)}</span>` : ''}
            ${f.pnr ? `<span class="bg-gray-100 text-gray-500 text-[11px] px-2 py-0.5 rounded font-black tracking-wider">${esc(f.pnr)}</span>` : ''}
            ${f.note ? `<span>${esc(f.note)}</span>` : ''}
          </div>` : ''}
        </div>`;
      }).join('') : `<div class="text-center py-20 text-gray-300 font-bold bg-white rounded-2xl border border-gray-50"><i data-lucide="plane" class="w-10 h-10 mx-auto mb-2 opacity-20"></i><p>尚無航班，點右上「新增航班」</p></div>`;
      icons();
    };

    function buildFlightMemberSelect() {
      $('flMember').innerHTML = people.map(p => `<option value="${esc(p)}">${esc(p)}</option>`).join('');
    }

    window.openAddFlight = () => {
      if (!activeTripId) { alert('請先選擇帳本'); return; }
      if (!people.length) { alert('請先在「記帳」頁新增成員'); return; }
      editingFlightId = null;
      $('flightModalTitle').innerText = '新增航班';
      $('flightDeleteBtn').setAttribute('x-hidden', '');
      buildFlightMemberSelect();
      $('flDirection').value = '去程';
      $('flMember').value = people[0] || '';
      $('flAirline').value = '';
      $('flNumber').value = '';
      $('flDate').value = new Date().toISOString().split('T')[0];
      $('flFromCode').value = ''; $('flFromName').value = ''; $('flDepTime').value = '';
      $('flToCode').value = ''; $('flToName').value = ''; $('flArrTime').value = '';
      $('flDuration').value = ''; $('flPnr').value = ''; $('flNote').value = '';
      window.openModal('addFlightModal');
    };

    window.editFlight = (id) => {
      const f = flightsCache[id];
      if (!f) return;
      editingFlightId = id;
      $('flightModalTitle').innerText = '編輯航班';
      $('flightDeleteBtn').removeAttribute('x-hidden');
      buildFlightMemberSelect();
      $('flDirection').value = f.direction || '去程';
      $('flMember').value = f.member || (people[0] || '');
      $('flAirline').value = f.airline || '';
      $('flNumber').value = f.number || '';
      $('flDate').value = f.date || '';
      $('flFromCode').value = f.fromCode || ''; $('flFromName').value = f.fromName || ''; $('flDepTime').value = f.depTime || '';
      $('flToCode').value = f.toCode || ''; $('flToName').value = f.toName || ''; $('flArrTime').value = f.arrTime || '';
      $('flDuration').value = f.duration || ''; $('flPnr').value = f.pnr || ''; $('flNote').value = f.note || '';
      window.openModal('addFlightModal');
    };

    window.saveFlight = async () => {
      if (!isAuthed || !activeTripId) return;
      const number = $('flNumber').value.trim();
      const fromCode = $('flFromCode').value.trim();
      const toCode = $('flToCode').value.trim();
      if (!fromCode || !toCode) { alert('請至少填寫出發與抵達機場代碼'); return; }
      const btn = $('flightSaveBtn'); const loader = $('flightSaveLoader');
      btn.disabled = true; loader.classList.add('active');
      try {
        const col = collection(db, 'artifacts', appId, 'public', 'data', `flights_${activeTripId}`);
        const data = {
          direction: $('flDirection').value,
          member: $('flMember').value,
          airline: $('flAirline').value.trim(),
          number,
          date: $('flDate').value,
          fromCode, fromName: $('flFromName').value.trim(), depTime: $('flDepTime').value,
          toCode, toName: $('flToName').value.trim(), arrTime: $('flArrTime').value,
          duration: $('flDuration').value.trim(),
          pnr: $('flPnr').value.trim(),
          note: $('flNote').value.trim(),
          updated_at: serverTimestamp()
        };
        if (editingFlightId) await updateDoc(doc(col, editingFlightId), data);
        else await addDoc(col, data);
        window.closeModal('addFlightModal');
      } catch (err) {
        console.error('航班儲存失敗', err);
        alert('儲存失敗，請確認網路與 Firebase 權限');
      } finally {
        btn.disabled = false; loader.classList.remove('active');
      }
    };

    window.deleteFlight = async () => {
      if (!editingFlightId || !isAuthed) return;
      if (!confirm('確定刪除此航班？')) return;
      await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', `flights_${activeTripId}`, editingFlightId));
      window.closeModal('addFlightModal');
    };

    // ===== 地圖（Leaflet + Nominatim）=====
    const CAT_COLOR = { '住宿': '#A2929E', '餐飲': '#C08267', '交通': '#7E96A6', '購物': '#BC93A0', '娛樂': '#C9A66B', '雜費': '#9E9384' };
    const geoCache = {};

    async function geocode(query) {
      const key = query.toLowerCase();
      if (geoCache[key]) return geoCache[key];
      try {
        const url = `https://nominatim.openstreetmap.org/search?format=json&limit=1&q=${encodeURIComponent(query)}`;
        const res = await fetch(url, { headers: { 'Accept-Language': 'zh-TW' } });
        const arr = await res.json();
        if (arr && arr.length) {
          const g = { lat: parseFloat(arr[0].lat), lng: parseFloat(arr[0].lon) };
          geoCache[key] = g;
          return g;
        }
      } catch (err) { console.warn('地點定位失敗', query, err); }
      return null;
    }

    const CAT_ICON = { '住宿':'bed-double', '餐飲':'utensils', '交通':'train-front', '購物':'shopping-bag', '娛樂':'camera', '雜費':'map-pin' };
    const ITIN2CAT = { '景點':'娛樂', '餐廳':'餐飲', '交通':'交通', '住宿':'住宿', '購物':'購物', '其他':'雜費' };

    function navBtn(lat, lng, name) {
      const q = name ? encodeURIComponent(name) : `${lat},${lng}`;
      const url = `https://www.google.com/maps/dir/?api=1&destination=${q}`;
      return `<a href="${url}" target="_blank" rel="noopener" style="display:inline-flex;align-items:center;gap:4px;margin-top:8px;background:#77875F;color:#fff;font-weight:800;font-size:11px;padding:5px 10px;border-radius:8px;text-decoration:none">🧭 Google Maps 導航</a>`;
    }

    function collectMapPoints() {
      const pts = [];
      itinerary.forEach(it => {
        if (it.lat == null || it.lng == null || (it.lat === 0 && it.lng === 0)) return;
        const cat = ITIN2CAT[it.type] || '雜費';
        pts.push({ cat, date: it.date || '', lat: it.lat, lng: it.lng, title: it.title, sub: `行程 · ${it.type || ''}${it.time ? ' · ' + it.time : ''}`, loc: it.location });
      });
      expenses.forEach(e => {
        if (e.lat == null || e.lng == null || (e.lat === 0 && e.lng === 0)) return;
        const cat = CATEGORIES.includes(e.category) ? e.category : '雜費';
        pts.push({ cat, date: e.date || '', lat: e.lat, lng: e.lng, title: e.note, sub: `${e.category || ''} · ${e.currency} ${Math.round(e.amount).toLocaleString()}`, loc: e.location });
      });
      return pts;
    }

    function mapPointsForDate() {
      return collectMapPoints().filter(p => mapDate === 'all' || p.date === mapDate);
    }
    window.setMapDate = (v) => { mapDate = v; renderMap(); };
    function buildMapDateFilter() {
      const dates = [...new Set(collectMapPoints().map(p => p.date).filter(Boolean))].sort();
      if (mapDate !== 'all' && !dates.includes(mapDate)) mapDate = 'all';
      const sel = $('mapDateFilter');
      sel.innerHTML = `<option value="all">全部日期</option>` + dates.map(d => `<option value="${d}">${mdw(d)}</option>`).join('');
      sel.value = mapDate;
    }

    function renderLayerChips() {
      const counts = {};
      mapPointsForDate().forEach(p => { counts[p.cat] = (counts[p.cat] || 0) + 1; });
      $('mapLayerChips').innerHTML = CATEGORIES.map(cat => {
        const on = mapLayerOn[cat] !== false;
        const color = CAT_COLOR[cat] || '#9E9384';
        return `<button onclick="window.toggleLayer('${cat}')" class="flex items-center justify-center gap-1.5 px-2 py-2 rounded-lg text-xs font-black border transition-all ${on ? 'text-white shadow-sm' : 'bg-white text-gray-300 border-gray-100'}" style="${on ? `background:${color};border-color:${color}` : ''}">
          <i data-lucide="${CAT_ICON[cat]}" class="w-3 h-3"></i>${cat} <span class="opacity-70">${counts[cat] || 0}</span>
        </button>`;
      }).join('');
    }
    window.toggleLayer = (k) => { mapLayerOn[k] = mapLayerOn[k] === false; renderMap(); };

    // 從首頁住宿 → 跳到地圖並定位
    window.gotoLodging = (i) => {
      const l = (tripMeta.lodgings || [])[i];
      if (!l) return;
      window.setPage('map');
      setTimeout(async () => {
        let lat = l.lat, lng = l.lng;
        if (lat == null || lng == null || (lat === 0 && lng === 0)) {
          const g = await geocode(l.name);
          if (g) { lat = g.lat; lng = g.lng; }
        }
        if (lat == null || lng == null) { alert('尚未定位到「' + l.name + '」，請稍後再試'); return; }
        map.setView([lat, lng], 15);
        L.popup().setLatLng([lat, lng]).setContent(
          `<div style="font-family:sans-serif;min-width:150px"><div style="font-weight:800;font-size:14px">${esc(l.name)}</div><div style="color:#A2929E;font-weight:700;font-size:11px">住宿 · ${l.nights || 1} 晚</div>${navBtn(lat, lng, l.name)}</div>`
        ).openOn(map);
      }, 400);
    };

    function renderMap() {
      if (!map) {
        map = L.map('mapView', { scrollWheelZoom: true }).setView([25.03, 121.56], 4);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
          maxZoom: 19, attribution: '© OpenStreetMap'
        }).addTo(map);
      }
      buildMapDateFilter();
      renderLayerChips();
      setTimeout(() => map.invalidateSize(), 60);
      mapMarkers.forEach(m => map.removeLayer(m));
      mapMarkers = [];

      const pts = mapPointsForDate().filter(p => mapLayerOn[p.cat] !== false);
      if (!pts.length) {
        $('mapEmpty').innerText = '尚無帶座標的地點。新增支出並填「地點」，或在行程加入含地點的項目，即會自動定位。';
        icons(); return;
      }
      $('mapEmpty').innerText = `地圖上共 ${pts.length} 個地點・點圖釘看詳情與導航`;

      const bounds = [];
      pts.forEach(p => {
        const color = CAT_COLOR[p.cat] || '#9E9384';
        const marker = L.circleMarker([p.lat, p.lng], {
          radius: 9, fillColor: color, color: '#fff', weight: 2, opacity: 1, fillOpacity: 0.9
        }).addTo(map);
        marker.bindPopup(`
          <div style="font-family:sans-serif;min-width:150px">
            <div style="font-weight:800;font-size:14px;margin-bottom:2px">${esc(p.title || '')}</div>
            <div style="color:${color};font-weight:700;font-size:11px">${esc(p.sub || '')}</div>
            ${p.loc ? `<div style="color:#9ca3af;font-size:11px;margin-top:3px">📍 ${esc(p.loc)}</div>` : ''}

    let backfilling = false;
    async function backfillCoords() {
      if (backfilling || !activeTripId) return;
      const pendingExp = expenses.filter(e => e.location && (e.lat == null || e.lng == null));
      const pendingItin = itinerary.filter(e => e.location && (e.lat == null || e.lng == null));
      if (!pendingExp.length && !pendingItin.length) return;
      backfilling = true;
      try {
        for (const exp of pendingExp) {
          const geo = await geocode(exp.location);
          await new Promise(r => setTimeout(r, 1100));
          const patch = geo ? { lat: geo.lat, lng: geo.lng } : { lat: 0, lng: 0 };
          await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', `expenses_${activeTripId}`, exp.dbId), patch);
        }
        for (const it of pendingItin) {
          const geo = await geocode(it.location);
          await new Promise(r => setTimeout(r, 1100));
          const patch = geo ? { lat: geo.lat, lng: geo.lng } : { lat: 0, lng: 0 };
          await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', `itinerary_${activeTripId}`, it.dbId), patch);
        }
      } catch (err) { console.warn('補定位中斷', err); }
      finally { backfilling = false; }

    // ===== 結算轉帳（兩兩沖銷）=====
    function computeSettlement() {
      const sumCur = $('settlementCurrency').value;
      const targetRate = rates[sumCur] || 1;
      const pairDebts = {};
      expenses.forEach(exp => {
        if (exp.splitMethod === '請客') return;
        const rate = rates[exp.currency] || 1;
        const amountTWD = (parseFloat(exp.amount) || 0) * rate;
        const payer = String(exp.payer);
        const parts = exp.participants || [];
        parts.forEach(p => {
          const pName = String(p);
          if (pName === payer) return;
          let share = 0;
          if (exp.splitMethod === '自訂金額') share = (parseFloat(exp.customAmounts?.[pName]) || 0) * rate;
          else if (exp.splitMethod === '代墊') { const others = parts.filter(i => String(i) !== payer); share = others.length ? amountTWD / others.length : 0; }
          else share = amountTWD / parts.length;
          if (share > 0) { if (!pairDebts[pName]) pairDebts[pName] = {}; pairDebts[pName][payer] = (pairDebts[pName][payer] || 0) + share; }
        });
      });
      const transfers = [];
      const seen = new Set();
      people.forEach(p1 => people.forEach(p2 => {
        if (p1 === p2) return;
        const key = [p1, p2].sort().join('::');
        if (seen.has(key)) return;
        seen.add(key);
        const a = (pairDebts[p1] && pairDebts[p1][p2]) || 0;
        const b = (pairDebts[p2] && pairDebts[p2][p1]) || 0;
        const diff = a - b;
        if (Math.abs(diff) > 0.01) {
          const from = diff > 0 ? p1 : p2;
          const to = diff > 0 ? p2 : p1;
          transfers.push({ from, to, amount: Math.abs(diff) / targetRate });
        }
      }));
      return transfers;
    }

    function getTransferDetails(from, to) {
      const sumCur = $('settlementCurrency').value;
      const targetRate = rates[sumCur] || 1;
      const details = [];
      expenses.forEach(exp => {
        if (exp.splitMethod === '請客') return;
        const payer = String(exp.payer);
        const parts = exp.participants || [];
        const rate = rates[exp.currency] || 1;
        const f = String(from), t = String(to);
        const shareOf = (name) => {
          if (exp.splitMethod === '自訂金額') return (parseFloat(exp.customAmounts?.[name]) || 0) * rate;
          if (exp.splitMethod === '代墊') { const others = parts.filter(p => String(p) !== payer); return others.length ? (exp.amount * rate) / others.length : 0; }
          return (exp.amount * rate) / parts.length;
        };
        if (payer === t && parts.includes(f)) { const s = shareOf(f); if (s > 0.01) details.push({ note: exp.note, amount: s / targetRate }); }
        if (payer === f && parts.includes(t)) { const s = shareOf(t); if (s > 0.01) details.push({ note: `(抵銷) ${exp.note}`, amount: -(s / targetRate) }); }
      });
      return details;
    }

      const box = $('estimateBox');
      if (!amount || !participants.length) { box.classList.add('hidden'); return; }
      box.classList.remove('hidden');
      let html = `<div class="flex items-center gap-1.5 text-blue-500 mb-1"><i data-lucide="pie-chart" class="w-3.5 h-3.5"></i><span class="text-[10px] font-black uppercase tracking-wider">預估分擔 (${curr})</span></div>`;

    // ===== 收據上傳 + AI 辨識 =====
    window.handleImgUpload = (input) => {
      const file = input.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.readAsDataURL(file);
      reader.onload = (e) => {
        const img = new Image();
        img.src = e.target.result;
        img.onload = () => {
          const canvas = document.createElement('canvas');
          const max = 800;
          let w = img.width, h = img.height;
          if (w > max) { h *= max / w; w = max; }
          canvas.width = w; canvas.height = h;
          canvas.getContext('2d').drawImage(img, 0, 0, w, h);
          previewUrl = canvas.toDataURL('image/jpeg', 0.6);
          $('imgLabel').innerHTML = `<img src="${previewUrl}" alt="收據" class="w-full h-full object-cover" />`;
          if (GEMINI_API_KEY) analyzeReceipt(previewUrl.split(',')[1]);
        };
      };
    };

    async function analyzeReceipt(base64) {
      $('aiLoader').classList.remove('hidden');
      const prompt = '分析收據 JSON: { "merchant": "名稱", "amount": 數字, "currency": "TWD/JPY/USD...", "category": "類別", "date": "YYYY-MM-DD" }';
      try {
        const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent?key=${GEMINI_API_KEY}`, {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ contents: [{ parts: [{ text: prompt }, { inlineData: { mimeType: 'image/jpeg', data: base64 } }] }] })
        });
        const result = await res.json();
        const text = (result.candidates?.[0]?.content?.parts?.[0]?.text || '').replace(/```json|```/g, '');
        const data = JSON.parse(text);
        if (data.merchant) $('expNote').value = data.merchant;
        if (data.amount) $('expAmount').value = data.amount;
        if (data.currency && CURRENCIES.some(c => c.code === data.currency)) $('expCurrency').value = data.currency;
        if (data.category && CATEGORIES.includes(data.category)) $('expCategory').value = data.category;
        if (data.date) $('expDate').value = data.date;
        window.updateEstimate();
      } catch (err) { console.error('AI 辨識失敗', err); }
      finally { $('aiLoader').classList.add('hidden'); }
    }

    // ===== 日期工具 =====

    const dObj = (s) => new Date(s + 'T00:00:00');
    const daysBetween = (a, b) => Math.round((dObj(b) - dObj(a)) / 86400000);
    const addDays = (s, n) => { const d = new Date(dObj(s).getTime() + n * 86400000); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; };
    const mdw = (s) => { const d = dObj(s); return `${d.getMonth()+1}/${d.getDate()} (${WD[d.getDay()]})`; };
    // 時間輸入遮罩：強制 24 小時 HH:MM
    window.maskTime = (el) => {
      let v = el.value.replace(/[^0-9]/g, '').slice(0, 4);
      if (v.length >= 3) v = v.slice(0, 2) + ':' + v.slice(2);

    // 小萬年曆：只呈現當月
    function renderHomeCalendar() {
      const now = new Date();
      const y = now.getFullYear(), m = now.getMonth();
      const t = todayStr();
      const first = new Date(y, m, 1);
      const startDow = first.getDay();
      const daysInMonth = new Date(y, m + 1, 0).getDate();
      // 有記帳或行程的日子
      const marked = new Set();
      expenses.forEach(e => { if (e.date) marked.add(e.date); });
      itinerary.forEach(i => { if (i.date) marked.add(i.date); });
      const pad = (n) => String(n).padStart(2, '0');
      const cells = [];
      for (let i = 0; i < startDow; i++) cells.push('<div></div>');
      for (let d = 1; d <= daysInMonth; d++) {
        const ds = `${y}-${pad(m + 1)}-${pad(d)}`;
        const isToday = ds === t;
        const has = marked.has(ds);
        const dow = new Date(y, m, d).getDay();
        const weekend = dow === 0 || dow === 6;
        cells.push(`<div class="relative flex flex-col items-center justify-center aspect-square rounded-lg text-xs font-black ${isToday ? 'bg-blue-500 text-white shadow-sm' : weekend ? 'text-blue-400' : 'text-gray-600'}">

    // ===== 天氣（Open-Meteo，免金鑰）=====
    function wmo(code) {
      if (code === 0) return { icon: 'sun', label: '晴' };
      if (code <= 2) return { icon: 'cloud-sun', label: '多雲時晴' };
      if (code === 3) return { icon: 'cloud', label: '陰' };
      if (code <= 48) return { icon: 'cloud-fog', label: '霧' };
      if (code <= 57) return { icon: 'cloud-drizzle', label: '毛毛雨' };
      if (code <= 67) return { icon: 'cloud-rain', label: '雨' };
      if (code <= 77) return { icon: 'snowflake', label: '雪' };
      if (code <= 82) return { icon: 'cloud-rain', label: '陣雨' };
      if (code <= 86) return { icon: 'snowflake', label: '陣雪' };
      return { icon: 'cloud-lightning', label: '雷雨' };
    }
    async function fetchWeather() {
      const box = $('homeWeather');
      let lat = tripMeta.destLat, lng = tripMeta.destLng;

        const g = await geocode(tripMeta.destination);
        if (g) { lat = g.lat; lng = g.lng; }
      }
      if (lat == null || lng == null) { box.innerHTML = ''; return; }
      try {
        const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lng}&current=temperature_2m,weather_code&daily=weather_code,temperature_2m_max,temperature_2m_min&timezone=auto&forecast_days=5`;
        const r = await fetch(url);
        const d = await r.json();
        const cur = wmo(d.current.weather_code);
        const days = d.daily.time.map((t, i) => {
          const w = wmo(d.daily.weather_code[i]);
          return `<div class="flex flex-col items-center gap-1 flex-1"><span class="text-[10px] text-gray-400 font-bold">${mdw(t).split(' ')[0]}</span><i data-lucide="${w.icon}" class="w-4 h-4 text-blue-400"></i><span class="text-[10px] font-black text-gray-600">${Math.round(d.daily.temperature_2m_max[i])}°</span><span class="text-[9px] text-gray-300 font-bold">${Math.round(d.daily.temperature_2m_min[i])}°</span></div>`;
        }).join('');
        box.innerHTML = `<div class="bg-gray-50 rounded-2xl p-4">
          <div class="flex items-center justify-between mb-3">
            <div class="flex items-center gap-2"><i data-lucide="${cur.icon}" class="w-7 h-7 text-blue-400"></i><div><div class="text-2xl font-black text-gray-700">${Math.round(d.current.temperature_2m)}°</div><div class="text-[10px] text-gray-400 font-bold">${cur.label} · ${esc(tripMeta.destination||'')}</div></div></div>
          </div>
          <div class="flex gap-1">${days}</div>
        </div>`;
        icons();
      } catch (err) { console.warn('天氣載入失敗', err); box.innerHTML = ''; }
    }

    // ===== 行程（時間軸 + 住宿色帶 + 高亮今天）=====
    function lodgingForDate(dateStr) {
      const lodgings = tripMeta.lodgings || [];
      for (const l of lodgings) {
        if (!l.checkin || !l.nights) continue;
        const diff = daysBetween(l.checkin, dateStr);
        if (diff >= 0 && diff < l.nights) return { ...l, night: diff + 1 };
      }
      return null;

                </div>
                <div class="flex flex-col items-center shrink-0">
                  <div class="w-3 h-3 rounded-full mt-1" style="background:${ty.color}"></div>
                  <div class="flex-1 w-0.5 bg-gray-100 my-1"></div>
                </div>
                <div class="flex-1 min-w-0 pb-2">
                  <div class="flex items-center gap-1.5"><i data-lucide="${ty.icon}" class="w-3.5 h-3.5" style="color:${ty.color}"></i><span class="font-black text-gray-700 truncate">${esc(it.title)}</span></div>
                  ${it.location ? `<div class="text-[11px] text-gray-400 font-bold mt-0.5 flex items-center gap-1"><i data-lucide="map-pin" class="w-3 h-3"></i>${esc(it.location)}</div>` : ''}
                  ${it.note ? `<div class="text-[11px] text-gray-400 font-bold mt-0.5 italic">${esc(it.note)}</div>` : ''}
                </div>
              </div>`;
            }).join('') : `<div class="text-center py-4 text-gray-300 text-xs font-bold">這天還沒安排</div>`}
          </div>
        </div>`;
      }).join('');
      icons();
    }

    function buildItinTypeSelect() {
      $('itType').innerHTML = Object.keys(ITIN_TYPES).map(k => `<option value="${k}">${k}</option>`).join('');
    }
    window.openAddItin = () => {
      if (!activeTripId) { alert('請先選擇帳本'); return; }
      editingItinId = null;
      $('itinModalTitle').innerText = '新增行程';
      $('itinDeleteBtn').setAttribute('x-hidden', '');
      buildItinTypeSelect();
      $('itTitle').value = '';
      $('itDate').value = tripMeta.startDate && daysBetween(todayStr(), tripMeta.startDate) > 0 ? tripMeta.startDate : todayStr();
      $('itTime').value = '';
      $('itType').value = '景點';
      $('itLocation').value = '';
      $('itNote').value = '';
      window.openModal('addItinModal');
    };
    window.editItin = (id) => {
      const it = itineraryCache[id]; if (!it) return;
      editingItinId = id;
      $('itinModalTitle').innerText = '編輯行程';
      $('itinDeleteBtn').removeAttribute('x-hidden');
      buildItinTypeSelect();
      $('itTitle').value = it.title || '';
      $('itDate').value = it.date || todayStr();
      $('itTime').value = it.time || '';
      $('itType').value = it.type || '景點';
      $('itLocation').value = it.location || '';
      $('itNote').value = it.note || '';
      window.openModal('addItinModal');
    };
    window.saveItin = async () => {
      if (!isAuthed || !activeTripId) return;
      const title = $('itTitle').value.trim();
      if (!title) { alert('請填寫行程名稱'); return; }
      const btn = $('itinSaveBtn'), loader = $('itinSaveLoader');
      btn.disabled = true; loader.classList.add('active');
      try {
        const locationText = $('itLocation').value.trim();
        let geo = null;
        const prev = editingItinId ? itineraryCache[editingItinId] : null;
        if (locationText) {
          if (prev && prev.location === locationText && prev.lat != null) geo = { lat: prev.lat, lng: prev.lng };
          else geo = await geocode(locationText);
        }
        const col = collection(db, 'artifacts', appId, 'public', 'data', `itinerary_${activeTripId}`);
        const data = {
          title, date: $('itDate').value, time: $('itTime').value,
          type: $('itType').value, location: locationText, note: $('itNote').value.trim(),
          lat: geo ? geo.lat : null, lng: geo ? geo.lng : null,
          updated_at: serverTimestamp()
        };
        if (editingItinId) await updateDoc(doc(col, editingItinId), data);
        else await addDoc(col, data);
        window.closeModal('addItinModal');
      } catch (err) { console.error('行程儲存失敗', err); alert('儲存失敗，請確認網路與權限'); }
      finally { btn.disabled = false; loader.classList.remove('active'); }
    };
    window.deleteItin = async () => {
      if (!editingItinId || !isAuthed) return;
      if (!confirm('確定刪除此行程？')) return;
      await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', `itinerary_${activeTripId}`, editingItinId));
      window.closeModal('addItinModal');
    };

    // ===== 清單（願望 / 必買）=====
    window.setListType = (t) => {
      listType = t;
      const on = 'listtab flex-1 px-4 py-2.5 rounded-lg text-sm font-black flex items-center justify-center gap-1.5 transition-all bg-white text-blue-500 shadow-sm border border-blue-100';
      const off = 'listtab flex-1 px-4 py-2.5 rounded-lg text-sm font-black flex items-center justify-center gap-1.5 transition-all bg-transparent text-gray-400 hover:bg-white';
      $('listTabWish').className = t === 'wish' ? on : off;
      $('listTabBuy').className = t === 'buy' ? on : off;
      renderLists();
    };
    function renderLists() {
      $('newListMember').innerHTML = `<option value="">未指定</option>` + people.map(p => `<option value="${esc(p)}">${esc(p)}</option>`).join('');
      const items = lists.filter(l => (l.listType || 'wish') === listType);
      const done = items.filter(i => i.done).length;
      $('listProgress').innerHTML = items.length ? `<div class="flex items-center gap-3"><div class="flex-1 h-2 bg-gray-100 rounded-full overflow-hidden"><div class="h-full bg-blue-400 rounded-full transition-all" style="width:${Math.round(done/items.length*100)}%"></div></div><span class="text-xs text-gray-400 font-black">${done}/${items.length}</span></div>` : '';
      $('listItems').innerHTML = items.length ? items.map(it => `
        <div class="flex items-center gap-3 bg-white rounded-xl border border-[#E7DFD2] px-4 py-3 group">
          <button onclick="window.toggleListItem('${it.dbId}')" title="完成" class="shrink-0 w-6 h-6 rounded-md border-2 flex items-center justify-center transition-all ${it.done ? 'bg-blue-500 border-blue-500 text-white' : 'border-gray-200 text-transparent hover:border-blue-300'}"><i data-lucide="check" class="w-4 h-4"></i></button>
          <div class="flex-1 min-w-0">
            <div class="font-bold ${it.done ? 'text-gray-300 line-through' : 'text-gray-700'} truncate">${esc(it.text)}</div>
          </div>
          ${it.member ? `<span class="bg-gray-100 text-gray-500 text-[10px] px-2 py-0.5 rounded-full font-black shrink-0">${esc(it.member)}</span>` : ''}
          <button onclick="window.deleteListItem('${it.dbId}')" title="刪除" class="text-red-300 hover:text-red-500 opacity-60 sm:opacity-0 group-hover:opacity-100 transition-opacity shrink-0"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
        </div>`).join('') : `<div class="text-center py-16 text-gray-300 font-bold"><i data-lucide="${listType === 'wish' ? 'sparkles' : 'shopping-bag'}" class="w-10 h-10 mx-auto mb-2 opacity-20"></i><p>${listType === 'wish' ? '還沒有願望，加一個吧' : '還沒有必買，加一個吧'}</p></div>`;
      icons();
    }
    window.addListItem = async () => {
      if (!isAuthed || !activeTripId) return;
      const input = $('newListInput');
      const text = input.value.trim();
      if (!text) return;
      await addDoc(collection(db, 'artifacts', appId, 'public', 'data', `lists_${activeTripId}`), {
        text, listType, member: $('newListMember').value || '', done: false, created_at: Date.now()
      });
      input.value = '';
    };
    window.toggleListItem = async (id) => {
      const it = listsCache[id]; if (!it) return;
      await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', `lists_${activeTripId}`, id), { done: !it.done });
    };
    window.deleteListItem = async (id) => {
      await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', `lists_${activeTripId}`, id));
    };

    // ===== 即時匯率 =====
    async function loadLiveRates(force) {
      if (liveRates && !force) return liveRates;
      try {
        const r = await fetch('https://open.er-api.com/v6/latest/USD');
        const d = await r.json();
        if (d.result === 'success') {
          liveRates = { rates: d.rates, time: d.time_last_update_utc };
          $('rateUpdated') && ($('rateUpdated').innerText = `即時匯率・更新於 ${new Date(d.time_last_update_unix*1000).toLocaleString('zh-TW')}`);
        }
      } catch (err) { console.warn('匯率載入失敗', err); $('rateUpdated') && ($('rateUpdated').innerText = '匯率載入失敗，請稍後再試'); }
      return liveRates;
    }
    function liveRate(from, to) {
      if (!liveRates) return null;
      const rf = liveRates.rates[from], rt = liveRates.rates[to];
      if (!rf || !rt) return null;
      return rt / rf;
    }
    window.loadLiveRates = async (force) => { await loadLiveRates(force); window.convert('from'); renderRateQuick(); };
    async function renderRatesPage() {
      const codes = CURRENCIES.map(c => c.code);
      $('convFrom').innerHTML = codes.map(c => `<option value="${c}">${c}</option>`).join('');
      $('convTo').innerHTML = codes.map(c => `<option value="${c}">${c}</option>`).join('');
      $('convFrom').value = tripMeta.foreignCurrency || 'JPY';
      $('convTo').value = 'TWD';
      await loadLiveRates(false);
      renderRateQuick();
      window.convert('from');
    }
    function renderRateQuick() {
      $('rateQuickTable').innerHTML = CURRENCIES.filter(c => c.code !== 'TWD').map(c => {
        const r = liveRate(c.code, 'TWD');
        return `<div class="flex justify-between items-center text-sm"><span class="text-gray-500 font-bold">1 ${c.code} (${c.symbol})</span><span class="font-black text-gray-700">${r ? r.toFixed(3) : '—'} <span class="text-xs text-gray-400">TWD</span></span></div>`;
      }).join('');
    }
    window.convert = (dir) => {
      const from = $('convFrom').value, to = $('convTo').value;
      const r = liveRate(from, to);
      if (r == null) return;
      if (dir === 'from') {
        const v = parseFloat($('convFromAmt').value) || 0;
        $('convToAmt').value = (v * r).toFixed(2);
      } else {
        const v = parseFloat($('convToAmt').value) || 0;
        $('convFromAmt').value = (v / r).toFixed(2);
      }
    };
    window.applyLiveRatesToTrip = async () => {
      if (!liveRates) { alert('尚未取得即時匯率'); return; }
      const newRates = { TWD: 1 };
      CURRENCIES.filter(c => c.code !== 'TWD').forEach(c => { const r = liveRate(c.code, 'TWD'); if (r) newRates[c.code] = Math.round(r * 1000) / 1000; });
      rates = { ...rates, ...newRates };
      await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'trip_settings', activeTripId), { rates: newRates }, { merge: true });
      alert('已套用即時匯率到此帳本的記帳換算');
    };

    // ===== 旅程設定 =====
    window.openTripSettings = () => {
      if (!activeTripId) return;
      metaModeDraft = tripMeta.mode || 'travel';
      window.setMetaMode(metaModeDraft);
      fillCurrencySelect($('metaCurrency'), tripMeta.foreignCurrency || 'JPY');
      $('metaDest').value = tripMeta.destination || '';
      $('metaStart').value = tripMeta.startDate || '';
      $('metaEnd').value = tripMeta.endDate || '';
      window.openModal('tripSettingsModal');
    };
    window.openLodgingModal = () => {
      if (!activeTripId) return;
      lodgingDraft = (tripMeta.lodgings || []).map(l => ({ ...l }));
      renderLodgingDraft();
      window.openModal('lodgingModal');
    };
    window.setMetaMode = (mode) => {
      metaModeDraft = mode;
      const on = 'flex items-center justify-center gap-1.5 py-2.5 rounded-xl border-2 text-sm font-black transition-all border-blue-500 bg-blue-50 text-blue-600';
      const off = 'flex items-center justify-center gap-1.5 py-2.5 rounded-xl border-2 text-sm font-black transition-all border-gray-100 text-gray-400';
      $('metaModeSimple').className = mode === 'simple' ? on : off;
      $('metaModeTravel').className = mode === 'travel' ? on : off;
      $('metaTravelFields').toggleAttribute('x-hidden', mode === 'simple');
      icons();
    };
    window.addLodgingRow = () => { lodgingDraft.push({ name: '', checkin: tripMeta.startDate || todayStr(), nights: 1, amount: '', currency: tripMeta.foreignCurrency || 'TWD', color: LODGE_COLORS[lodgingDraft.length % LODGE_COLORS.length] }); renderLodgingDraft(); };
    window.removeLodgingRow = (i) => { lodgingDraft.splice(i, 1); renderLodgingDraft(); };
    window.setLodgingField = (i, f, v) => { lodgingDraft[i][f] = f === 'nights' ? (parseInt(v) || 1) : v; };
    function renderLodgingDraft() {
      const curOpts = CURRENCIES.map(c => c.code).join(',');
      $('lodgingEditList').innerHTML = lodgingDraft.map((l, i) => `
        <div class="border border-gray-100 rounded-xl p-3 space-y-2" style="border-left:4px solid ${l.color || '#A2929E'}">
          <div class="flex gap-2">
            <input value="${esc(l.name || '')}" oninput="window.setLodgingField(${i},'name',this.value)" placeholder="飯店名稱/地點" class="flex-1 border-b border-gray-100 py-1 text-sm font-bold outline-none focus:border-blue-400 bg-transparent" />
            <button onclick="window.removeLodgingRow(${i})" title="移除" class="text-red-300 hover:text-red-500"><i data-lucide="x" class="w-4 h-4"></i></button>
          </div>
          <div class="flex gap-2 items-center">
            <input type="date" value="${l.checkin || ''}" onchange="window.setLodgingField(${i},'checkin',this.value)" class="border border-gray-100 rounded-lg px-2 py-1 text-xs font-bold outline-none" />
            <span class="text-xs text-gray-400 font-bold">住</span>
            <input type="number" min="1" value="${l.nights || 1}" onchange="window.setLodgingField(${i},'nights',this.value)" class="w-12 border border-gray-100 rounded-lg px-2 py-1 text-xs font-black outline-none text-center" />
            <span class="text-xs text-gray-400 font-bold">晚</span>
          </div>
          <div class="flex gap-2 items-center">
            <i data-lucide="wallet" class="w-3.5 h-3.5 text-gray-300"></i>
            <input type="number" value="${l.amount ?? ''}" oninput="window.setLodgingField(${i},'amount',this.value)" placeholder="金額（自動記帳）" class="flex-1 border border-gray-100 rounded-lg px-2 py-1 text-xs font-black outline-none" />
            <select onchange="window.setLodgingField(${i},'currency',this.value)" class="border border-gray-100 rounded-lg px-1 py-1 text-xs font-bold outline-none cursor-pointer">${CURRENCIES.map(c => `<option value="${c.code}" ${((l.currency || 'TWD') === c.code) ? 'selected' : ''}>${c.code}</option>`).join('')}</select>
          </div>
        </div>`).join('');
      icons();
    }
    window.saveTripMeta = async () => {
      if (!activeTripId) return;
      const loader = $('metaSaveLoader'); loader.classList.add('active');
      try {
        const dest = $('metaDest').value.trim();
        let destLat = tripMeta.destLat, destLng = tripMeta.destLng;
        if (dest && dest !== tripMeta.destination) {
          const g = await geocode(dest);
          if (g) { destLat = g.lat; destLng = g.lng; } else { destLat = null; destLng = null; }
        }
        const meta = {
          mode: metaModeDraft,
          destination: dest, destLat: destLat ?? null, destLng: destLng ?? null,
          startDate: $('metaStart').value, endDate: $('metaEnd').value,
          foreignCurrency: $('metaCurrency').value
        };
        await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'trip_settings', activeTripId), { meta }, { merge: true });
        await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'trips_list', activeTripId), { mode: metaModeDraft });
        window.closeModal('tripSettingsModal');
      } catch (err) { console.error('旅程設定儲存失敗', err); alert('儲存失敗'); }
      finally { loader.classList.remove('active'); }
    };

    window.saveLodging = async () => {
      if (!activeTripId) return;
      const loader = $('lodgeSaveLoader'); loader.classList.add('active');
      try {
        for (const l of lodgingDraft) {
          if (l.name && (l.lat == null || l._geoName !== l.name)) {
            const g = await geocode(l.name);
            await new Promise(r => setTimeout(r, 400));
            if (g) { l.lat = g.lat; l.lng = g.lng; l._geoName = l.name; }
          }
        }
        const lodgings = lodgingDraft.filter(l => l.name);
        const expCol = collection(db, 'artifacts', appId, 'public', 'data', `expenses_${activeTripId}`);
        for (const ol of (tripMeta.lodgings || [])) {
          const oldIds = ol.expenseIds || (ol.expenseId ? [ol.expenseId] : []);
          for (const id of oldIds) { try { await deleteDoc(doc(expCol, id)); } catch (e) {} }
        }
        for (const l of lodgings) {
          delete l.expenseId;
          l.expenseIds = [];
          const amt = parseFloat(l.amount);
          const nights = Math.max(1, parseInt(l.nights) || 1);
          if (amt > 0) {
            const base = Math.round(amt / nights);
            for (let i = 0; i < nights; i++) {
              const nightAmt = i === 0 ? amt - base * (nights - 1) : base;
              const nightDate = l.checkin ? addDays(l.checkin, i) : todayStr();
              const expData = {
                note: nights > 1 ? `${l.name}（第${i + 1}/${nights}晚）` : l.name,
                amount: nightAmt, currency: l.currency || tripMeta.foreignCurrency || 'TWD',
                category: '住宿', paymentMethod: '信用卡', date: nightDate, scheduleTime: '',
                splitMethod: '平分', payer: people[0] || '', participants: [...people], customAmounts: {},
                remarks: '住宿（自動記帳）', location: l.name, previewUrl: null,
                lat: l.lat ?? null, lng: l.lng ?? null,
                created_at: Date.now() + i, updated_at: serverTimestamp()
              };
              const ne = await addDoc(expCol, expData);
              l.expenseIds.push(ne.id);
            }
          }
        }
        await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'trip_settings', activeTripId), { meta: { lodgings } }, { merge: true });
        window.closeModal('lodgingModal');
      } catch (err) { console.error('住宿儲存失敗', err); alert('儲存失敗'); }
      finally { loader.classList.remove('active'); }
    };

    // 住宿座標補定位（開地圖時）
    let lodgeBackfilling = false;
    async function backfillLodging() {
      if (lodgeBackfilling || !activeTripId) return;
      const lodgings = tripMeta.lodgings || [];
      const pending = lodgings.filter(l => l.name && (l.lat == null || l.lng == null));
      if (!pending.length) return;
      lodgeBackfilling = true;
      try {
        for (const l of pending) { const g = await geocode(l.name); await new Promise(r => setTimeout(r, 1100)); if (g) { l.lat = g.lat; l.lng = g.lng; } else { l.lat = 0; l.lng = 0; } }
        await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'trip_settings', activeTripId), { meta: { ...tripMeta, lodgings } }, { merge: true });
      } catch (err) { console.warn('住宿補定位中斷', err); }
      finally { lodgeBackfilling = false; }
    }

    // ===== Modal helpers =====
    window.openModal = (id) => {
      if (id === 'ratesModal') renderRates();
      $(id).classList.add('active');
      icons();
    };
    window.closeModal = (id) => {
      // 起始帳本選擇頁：尚未選帳本時不可關閉
      if (id === 'tripModal' && !activeTripId) return;
      $(id).classList.remove('active');
    };

    // close modal on backdrop click
    document.querySelectorAll('.modal').forEach(m => m.addEventListener('click', (e) => {
      if (e.target !== m) return;
      if (m.id === 'tripModal' && !activeTripId) return;
      m.classList.remove('active');
    }));

    icons();
    init();
  </script>
</body>
</html>
