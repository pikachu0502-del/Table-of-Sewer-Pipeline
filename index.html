                    <option value="油脂結垢">油脂結垢</option>
                    <option value="PVC裡襯剝離(含節O型環)">PVC裡襯剝離(含節O型環)</option>
                </select>
            `;
        }

        function updateRowNumbers(table) {
            // 編號改為跨專案全局連續編號（依專案列表順序），不再每個專案從 1 重新開始
            let currentId = 1;
            projects.forEach(p => {
                const panel = document.querySelector(`#panel-${p.id}`);
                if (!panel) return;
                const t = panel.querySelector('table');
                if (!t) return;
                const tbodys = t.querySelectorAll('tbody.segment-group');
                tbodys.forEach(tbody => {
                    const mainRow = tbody.querySelector('tr[data-segment-type="new"]');
                    if (mainRow) {
                        const rowNumCell = mainRow.querySelector('.row-number');
                        if (rowNumCell) rowNumCell.textContent = currentId;
                    }
                    currentId++;
                });
            });
        }

        function calculateGroupMetrics(groupId) {
            const panel = document.querySelector(`#panel-${activeProjectId}`);
            if (!panel || !groupId) return;
            const groupRows = panel.querySelectorAll(`tr[data-group-id="${groupId}"]`);
            let totalWeight = 0;
            let severeWeight = 0;
            let moderateWeight = 0;
            let hasLevel1Condition = false;
            
            const targetCategories = ["破損龜裂", "接頭脫開", "變形", "下陷", "腐蝕沖蝕", "滲漏"];
            
            groupRows.forEach(row => {
                const singleInput = row.querySelector('.single-weight-input');
                const scoreInput = row.querySelector('.score-input');
                const selectElement = row.querySelector('.anomaly-desc-select');
                
                const val = parseFloat(singleInput?.value);
                const score = parseFloat(scoreInput?.value);
                const category = selectElement?.value;

                if (!isNaN(val)) {
                    totalWeight += val;
                    if (score === 3) severeWeight += val;
                    if (score === 2) moderateWeight += val;
                }

                if (targetCategories.includes(category) && score === 3) {
                    hasLevel1Condition = true;
                }
            });

            let baseGrade = '';
            if (totalWeight > 0) {
                if (totalWeight >= 30 || moderateWeight >= 20 || severeWeight >= 15) {
                    baseGrade = 'A';
                } else if (totalWeight >= 20 || moderateWeight >= 12 || severeWeight >= 8) {
                    baseGrade = 'B';
                } else {
                    baseGrade = 'C';
                }
            }

            let finalGrade = '';
            let suggestion = '';

            if (baseGrade) {
                const subClass = hasLevel1Condition ? '1' : '2';
                finalGrade = `${baseGrade}-${subClass}`;

                if (subClass === '1') {
                    suggestion = "優先辦理修繕";
                } else {
                    if (baseGrade === 'A') {
                        suggestion = "編列預算後排入年度修繕";
                    } else {
                        suggestion = "持續追蹤管制暫不修繕";
                    }
                }
            }

            groupRows.forEach(row => {
                const totalInput = row.querySelector('.total-weight-input');
                if (totalInput) totalInput.value = totalWeight > 0 ? Math.round(totalWeight).toString() : '0';

                const gradeInput = row.querySelector('.eval-grade-input');
                if (gradeInput) {
                    gradeInput.value = finalGrade;
                    gradeInput.classList.remove('text-red-500', 'text-orange-500', 'text-green-600');
                    if (finalGrade.startsWith('A')) gradeInput.classList.add('text-red-500');
                    else if (finalGrade.startsWith('B')) gradeInput.classList.add('text-orange-500');
                    else if (finalGrade.startsWith('C')) gradeInput.classList.add('text-green-600');
                }

                const suggestionInput = row.querySelector('.suggestion-input');
                if (suggestionInput) suggestionInput.value = suggestion;
            });
        }

        function calculateSingleWeight(row) {
            const weightInput = row.querySelector('.weight-input');
            const scoreInput = row.querySelector('.score-input');
            const singleWeightInput = row.querySelector('.single-weight-input');

            const weight = parseFloat(weightInput.value);
            const score = parseFloat(scoreInput.value);

            if (!isNaN(weight) && !isNaN(score)) {
                singleWeightInput.value = Math.round(weight * score).toString();
            } else {
                singleWeightInput.value = '';
            }
            
            calculateGroupMetrics(row.dataset.groupId);
        }

        function updateFields(selectElement) {
            const selectedValue = selectElement.value;
            const row = selectElement.closest('tr');
            const categoryInput = row.querySelector('.category-input');
            const weightInput = row.querySelector('.weight-input');
            
            if (selectedValue) {
                if (categoryMap[selectedValue]) categoryInput.value = categoryMap[selectedValue];
                if (weightMap[selectedValue]) weightInput.value = weightMap[selectedValue];
            } else {
                categoryInput.value = '';
                weightInput.value = '';
            }
            calculateSingleWeight(row);
        }

        // 依「內容特徵」（而非位置、也不依賴現有 class）辨識一個 <td> 代表哪個欄位，
        // 用來修復曾經因先前版本錯誤而被搬到錯誤位置、或遭到 class 遺失的欄位
        function classifyCoreCell(cell) {
            if (cell.classList.contains('start-manhole-td') || cell.classList.contains('group-right-shared-td')) return 'unknown';
            if (cell.querySelector('svg')) return 'drag';
            if (cell.classList.contains('row-number')) return 'rownum';
            const select = cell.querySelector('select');
            if (select) {
                const opts = Array.from(select.options).map(o => o.value);
                if (opts.includes('RCP')) return 'material';
            }
            const input = cell.querySelector('input');
            if (input) {
                const ph = input.getAttribute('placeholder') || '';
                if (ph === '請輸入') return 'field';
                if (ph === '上游') return 'up';
                if (ph === '下游') return 'down';
                if (ph === 'YYYYMMDD') return 'date';
                if (ph === '路名') return 'road';
                if (input.type === 'number' && !input.readOnly) {
                    const onchange = input.getAttribute('onchange') || '';
                    if (onchange.indexOf('toFixed') !== -1) return 'length';
                    if (onchange.indexOf('Math.round') !== -1) return 'diameter';
                    return 'count';
                }
            }
            return 'unknown';
        }

        const CORE_BEFORE_START_TYPES = ['drag', 'rownum', 'field', 'up', 'down'];
        const CORE_AFTER_START_TYPES = ['date', 'count', 'road', 'length', 'diameter', 'material'];

        // 修復主列共用欄位的順序、class 與 rowSpan：掃描整列所有 <td>（不依賴現有標記）依內容辨識，
        // 若能完整辨識全部 11 個核心欄位就重新排列、補上 class、並修正 rowSpan；辨識不完整（例如子列）則完全不動
        function repairCoreCellOrder(row) {
            const tbody = row.closest('tbody');
            if (!tbody) return;
            const rowCount = tbody.querySelectorAll('tr.anomaly-row').length;

            const allTds = Array.from(row.children).filter(el => el.tagName === 'TD');
            const byType = {};
            allTds.forEach(td => {
                const t = classifyCoreCell(td);
                if (t !== 'unknown' && !byType[t]) byType[t] = td;
            });
            const allTypes = CORE_BEFORE_START_TYPES.concat(CORE_AFTER_START_TYPES);
            if (allTypes.some(t => !byType[t])) return; // 辨識不完整就不動，避免誤删/誤移

            allTypes.forEach(t => {
                byType[t].classList.add('core-shared-td');
                byType[t].rowSpan = rowCount;
            });

            const startTd = row.querySelector(':scope > td.start-manhole-td');
            const beforeCells = CORE_BEFORE_START_TYPES.map(t => byType[t]);
            const afterCells = CORE_AFTER_START_TYPES.map(t => byType[t]);
            if (startTd) {
                beforeCells.forEach(c => row.insertBefore(c, startTd));
                // 锚點不能是即將被移動的欄位本身（否則順序會被倒置），跳過它們找到真正穩定的後續項目
                const afterSet = new Set(afterCells);
                let anchor = startTd.nextSibling;
                while (anchor && afterSet.has(anchor)) anchor = anchor.nextSibling;
                afterCells.forEach(c => row.insertBefore(c, anchor));
            } else {
                const allCells = beforeCells.concat(afterCells);
                const cellSet = new Set(allCells);
                let anchor = row.firstElementChild;
                while (anchor && cellSet.has(anchor)) anchor = anchor.nextSibling;
                allCells.forEach(c => row.insertBefore(c, anchor));
            }
        }

        // 取得一列中「整個管段共用」的欄位格（工程標別～管材等 11 欄），用 class 判斷、不依賴固定索引
        function getCoreSharedCells(row) {
            return Array.from(row.querySelectorAll(':scope > td.core-shared-td'));
        }
        // 取得一列中「整個管段共用」的右側計算欄（總權重/評估分級/處理建議）
        function getGroupRightSharedCells(row) {
            return Array.from(row.querySelectorAll(':scope > td.group-right-shared-td'));
        }

        // 舊版本相容：舊資料的主列沒有 core-shared-td / start-manhole-td / group-right-shared-td 標記，
        // 這裡依原本固定的 12 欄位置自動補上標記（只會執行一次），並讓整個 tbody 的列共用同一起始人孔叛集
        function migrateLegacyGroup(tbody) {
            const mainRow = tbody.querySelector('tr[data-segment-type="new"]');
            if (!mainRow) return;
            if (mainRow.querySelector(':scope > td.core-shared-td') || mainRow.querySelector(':scope > td.start-manhole-td')) return;
            const cells = Array.from(mainRow.children).filter(c => c.tagName === 'TD');
            if (cells.length < 12) return;
            cells.forEach((cell, idx) => {
                if (idx === 5) {
                    cell.classList.add('start-manhole-td');
                } else if (idx < 12) {
                    cell.classList.add('core-shared-td');
                }
            });
            const allCells = Array.from(mainRow.cells);
            const totalLen = allCells.length;
            if (allCells[totalLen - 4]) allCells[totalLen - 4].classList.add('group-right-shared-td');
            if (allCells[totalLen - 3]) allCells[totalLen - 3].classList.add('group-right-shared-td');
            if (allCells[totalLen - 2]) allCells[totalLen - 2].classList.add('group-right-shared-td');

            const cid = mainRow.dataset.startClusterId || tbody.dataset.groupId;
            tbody.querySelectorAll('tr.anomaly-row').forEach(r => {
                if (!r.dataset.startClusterId) r.dataset.startClusterId = cid;
            });
        }
        // 把 coreCells 依正確順序插入 row：若 row 本身持有「起始人孔」格，coreCells 要分成前後兩段包住它；否則整組插在最前面
        function insertCoreCells(row, coreCells) {
            const startTd = row.querySelector(':scope > td.start-manhole-td');
            if (startTd) {
                const before = coreCells.slice(0, 5);
                const after = coreCells.slice(5);
                before.forEach(c => row.insertBefore(c, startTd));
                // 锚點不能是即將被移動的欄位本身（否則順序會被倒置），跳過它們找到真正穩定的後續項目
                const afterSet = new Set(after);
                let anchor = startTd.nextSibling;
                while (anchor && afterSet.has(anchor)) anchor = anchor.nextSibling;
                after.forEach(c => row.insertBefore(c, anchor));
            } else {
                const cellSet = new Set(coreCells);
                let anchor = row.firstElementChild;
                while (anchor && cellSet.has(anchor)) anchor = anchor.nextSibling;
                coreCells.forEach(c => row.insertBefore(c, anchor));
            }
        }

        // 依每列的 startClusterId，把「起始人孔」欄重建為多個連續叢集各自合併（預設全部同一叢集＝維持原本整段合併）
        function rebuildStartClusters(tbody) {
            const rows = Array.from(tbody.querySelectorAll('tr.anomaly-row'));
            if (rows.length === 0) return;

            // 先讀出現有各列（若持有格子）的值，避免重建時遺失
            const valueByRow = new Map();
            rows.forEach(r => {
                const td = r.querySelector(':scope > td.start-manhole-td');
                if (td) {
                    const input = td.querySelector('input');
                    valueByRow.set(r, input ? input.value : '');
                }
            });

            // 移除所有現有的起始人孔格，之後依叢集重建
            rows.forEach(r => {
                const td = r.querySelector(':scope > td.start-manhole-td');
                if (td) td.remove();
            });

            let i = 0;
            while (i < rows.length) {
                const cid = rows[i].dataset.startClusterId || rows[i].dataset.groupId;
                let j = i;
                while (j + 1 < rows.length && (rows[j + 1].dataset.startClusterId || rows[j + 1].dataset.groupId) === cid) j++;

                let value = '';
                for (let k = i; k <= j; k++) {
                    if (valueByRow.has(rows[k])) { value = valueByRow.get(rows[k]); break; }
                }

                const headRow = rows[i];
                const td = document.createElement('td');
                td.className = 'start-manhole-td';
                td.rowSpan = j - i + 1;
                const input = document.createElement('input');
                input.type = 'text';
                input.placeholder = '起始';
                input.value = value;
                td.appendChild(input);
                headRow.insertBefore(td, headRow.firstElementChild);

                i = j + 1;
            }
        }

        function rebuildGroupRowspans(tbody) {
            const rows = Array.from(tbody.querySelectorAll('tr.anomaly-row'));
            if (rows.length === 0) return;

            const oldMainRow = rows.find(r => r.dataset.segmentType === 'new');
            if (!oldMainRow) return;

            // 0) 舊版本相容：若這組是舊資料，先自動補上標記
            migrateLegacyGroup(tbody);
            // 0.5) 修復可能因先前版本 bug 而錯位的共用欄位順序
            repairCoreCellOrder(oldMainRow);

            // 1) 先重建起始人孔叛集（狜立於其他共用欄）
            rebuildStartClusters(tbody);

            // 2) 確定共用欄來源（若主列換人則來自舊主列），再重新排列正確順序
            const coreSource = (rows[0] !== oldMainRow) ? oldMainRow : rows[0];
            const coreCells = getCoreSharedCells(coreSource);
            const rightCells = getGroupRightSharedCells(coreSource);

            insertCoreCells(rows[0], coreCells);
            const actionCell = rows[0].lastElementChild;
            rightCells.forEach(cell => rows[0].insertBefore(cell, actionCell));

            if (rows[0] !== oldMainRow) {
                oldMainRow.dataset.segmentType = 'sub';
            }
            rows[0].dataset.segmentType = 'new';

            const rowCount = rows.length;
            const mainRow = rows[0];
            getCoreSharedCells(mainRow).forEach(c => c.rowSpan = rowCount);
            getGroupRightSharedCells(mainRow).forEach(c => c.rowSpan = rowCount);
        }

                <td class="group-right-shared-td"><input type="text" class="total-weight-input readonly-bg" readonly placeholder="自動計算"></td>

                <td class="flex flex-col gap-2 items-center justify-center p-2">
                    <div class="anomaly-drag-handle cursor-move text-gray-400 transition-colors" title="上下拖曳異常順序"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 9h8M8 15h8"></path></svg></div>

            // 插入「起始人孔」格（目前唯一叛集，於第 6 欄位置）

            startTd.appendChild(startInput);
            newRow.insertBefore(startTd, newRow.children[5]);
            
            newTbody.appendChild(newRow);

            new Sortable(newTbody, {

            showMessage('已新增管段');
        }

        function deleteRow(button) {
            const row = button.closest('tr');
            const tbody = row.closest('tbody');
            const table = tbody.closest('table');
            const rows = Array.from(tbody.querySelectorAll('tr.anomaly-row'));
            const allRows = table.querySelectorAll('tr.anomaly-row');
            
            if (allRows.length <= 1 && rows.length === 1) {
                showMessage('無法刪除，至少需要保留一列', true);
                return;
            }

            migrateLegacyGroup(tbody);

            if (rows.length === 1) {
                tbody.remove();
                updateRowNumbers(table);
            } else {
                // 若這列目前持有「起始人孔」共用格，先把它搬到同叛集的其他列，避免資料跏著被刪除的列一起不見
                const startTd = row.querySelector(':scope > td.start-manhole-td');
                if (startTd) {
                    const cid = row.dataset.startClusterId;
                    const sibling = rows.find(r => r !== row && r.dataset.startClusterId === cid);
                    if (sibling) {
                        sibling.insertBefore(startTd, sibling.firstElementChild);
                    }
                }

                if (row.dataset.segmentType === 'new') {
                    const nextRow = rows.find(r => r !== row);
                    if (nextRow) {
                        const coreCells = getCoreSharedCells(row);
                        const rightCells = getGroupRightSharedCells(row);

                        insertCoreCells(nextRow, coreCells);
                        const actionCell = nextRow.lastElementChild;
                        rightCells.forEach(cell => nextRow.insertBefore(cell, actionCell));

                        nextRow.dataset.segmentType = 'new';
                    }
                }
                row.remove();
                rebuildGroupRowspans(tbody);
                calculateGroupMetrics(tbody.dataset.groupId);
            }
            
            showMessage('已刪除資料列');
        }

            const criteria = scoreCriteriaMap[category];
            const tooltip = document.getElementById('scoreTooltip');
            
            tooltip.innerHTML = `
                <div class="font-bold text-blue-600 mb-2 border-b pb-1">${category} 評分標準</div>
                <ul class="text-sm space-y-1.5 text-left">
                    <li class="flex"><span class="w-20 shrink-0 font-semibold text-red-500">3分(嚴重):</span> <span class="text-gray-700">${criteria[3]}</span></li>
                    <li class="flex"><span class="w-20 shrink-0 font-semibold text-orange-500">2分(中度):</span> <span class="text-gray-700">${criteria[2]}</span></li>
                    <li class="flex"><span class="w-20 shrink-0 font-semibold text-green-500">1分(輕度):</span> <span class="text-gray-700">${criteria[1]}</span></li>
                </ul>
            `;

            const rect = inputElement.getBoundingClientRect();
            tooltip.style.top = (rect.bottom + 8) + 'px';

        function loadDiagramData(groupId, liElement) {
            currentDiagramGroupId = groupId;
            document.querySelectorAll('.diagram-segment-item').forEach(el => {
                el.classList.remove('bg-gray-700', 'border-l-4', 'border-blue-500', 'text-white');
                el.classList.add('text-gray-200');
            });
            if (liElement) {
                liElement.classList.add('bg-gray-700', 'border-l-4', 'border-blue-500', 'text-white');
                liElement.classList.remove('text-gray-200');
            }

            const panel = document.querySelector(`#panel-${activeProjectId}`);
            if (!panel) return;

            const mainRow = panel.querySelector(`tr[data-segment-type="new"][data-group-id="${groupId}"]`);
            if (!mainRow) return;

            const rowNum = mainRow.querySelector('.row-number')?.textContent || '';
            const inputs = mainRow.querySelectorAll('input, select');
            const projectName = inputs[0]?.value || '';
            const upstream = inputs[1]?.value || '';
            const downstream = inputs[2]?.value || '';
            
            let defaultSegmentId = '';
            if (upstream || downstream) {
                defaultSegmentId = `${upstream}${upstream && downstream ? '~' : ''}${downstream}`;
            }
            
            let defaultAnomalies = [];
            let defaultGrade = '';
            const allGroupRows = panel.querySelectorAll(`tr[data-group-id="${groupId}"]`);
            
            allGroupRows.forEach(row => {
                const sel = row.querySelector('.anomaly-desc-select');
                if(sel && sel.value && !defaultAnomalies.includes(sel.value)) defaultAnomalies.push(sel.value);
                const gradeInp = row.querySelector('.eval-grade-input');
                if(gradeInp && gradeInp.value) defaultGrade = gradeInp.value;
            });

            const currentAnomaliesJoined = defaultAnomalies.join('、');

            if (!diagramData[activeProjectId]) diagramData[activeProjectId] = {};
            let state = diagramData[activeProjectId][groupId];
            
            if (!state) {
                state = {
                    label: rowNum,
                    projectName: projectName,
                    title: '損壞管段狀況示意圖',
                    segmentId: defaultSegmentId,
                    anomalies: currentAnomaliesJoined,
                    grade: defaultGrade ? `損壞等級${defaultGrade}` : '',
                    photos: ['', '', '', ''],
                    photoOverrides: { 0: false, 1: false, 2: false, 3: false }
                };
                diagramData[activeProjectId][groupId] = state;
            } else {
                state.label = rowNum; 
                state.projectName = projectName; 
                state.segmentId = defaultSegmentId;
                state.anomalies = currentAnomaliesJoined;
                state.grade = defaultGrade ? `損壞等級${defaultGrade}` : '';
                if (!state.photoOverrides) {
                    state.photoOverrides = { 0: false, 1: false, 2: false, 3: false };
                }
            }

            const autoPhotos = [];
            const seenAnomalies = new Set();
            allGroupRows.forEach(row => {
                const sel = row.querySelector('.anomaly-desc-select');
                const anomaly = sel ? sel.value : '';
                const img = row.querySelector('.photo-upload-input ~ img');
                const photoSrc = (img && !img.classList.contains('hidden') && img.src.startsWith('data:')) ? img.src : null;
                
                if (photoSrc && anomaly && !seenAnomalies.has(anomaly)) {
                    seenAnomalies.add(anomaly);
                    if (autoPhotos.length < 4) {
                        autoPhotos.push(photoSrc);
                    }
                }
            });

            for (let i = 0; i < 4; i++) {
                if (!state.photoOverrides[i]) {
                    state.photos[i] = autoPhotos[i] || '';
                }
            }

            document.getElementById('diagram-project-label').value = state.label || '';
            document.getElementById('diagram-project-name').value = state.projectName || '';
            autoGrowTextarea(document.getElementById('diagram-project-name'));
            document.getElementById('diagram-title').value = state.title || '';
            document.getElementById('diagram-segment-id').value = state.segmentId || '';
            document.getElementById('diagram-anomalies').value = state.anomalies || '';
            document.getElementById('diagram-damage-grade').value = state.grade || '';

            for(let i=0; i<4; i++) {
                const slot = document.getElementById(`diagram-photo-slot-${i}`);
                const img = slot.querySelector('img');
                const placeholder = slot.querySelector('.photo-placeholder');
                const removeBtn = slot.querySelector('.btn-remove-diagram-photo');
                const annBtn = slot.querySelector('.btn-annotate-photo');
                const inp = slot.querySelector('input[type="file"]');
                
                inp.value = '';
                if(state.photos && state.photos[i]) {
                    img.src = state.photos[i];
                    img.classList.remove('hidden');
                    placeholder.classList.add('hidden');
                    removeBtn.classList.remove('hidden');
                    if (annBtn) annBtn.classList.remove('hidden');
                } else {
                    img.src = '';
                    img.classList.add('hidden');
                    placeholder.classList.remove('hidden');
                    removeBtn.classList.add('hidden');
                    if (annBtn) annBtn.classList.add('hidden');
                }
            }
        }

        // 提報修繕頁：僅列出評估分級為 A-1、B-1、C-1 的管段，內容同主統計表
        function generateReportDesignTable() {
            const ws = document.getElementById('reportDesignWorkspace');
            const panel = document.querySelector(`#panel-${activeProjectId}`);
            const src = panel ? panel.querySelector('table') : null;
            if (!src) { ws.innerHTML = '<p class="text-gray-500 p-4">尚無資料</p>'; return; }

            const KEEP = ['A-1', 'B-1', 'C-1'];
            const table = src.cloneNode(true);

            // cloneNode 不會複製以 .value 設定的即時值，逐一從來源複製回來
            const srcFields = src.querySelectorAll('input, select, textarea');
            const cloneFields = table.querySelectorAll('input, select, textarea');
            srcFields.forEach((s, i) => {
                const c = cloneFields[i];
                if (!c) return;
                c.value = s.value;
                if (c.tagName !== 'SELECT') c.setAttribute('value', s.value);
            });

            // 僅保留評估分級 A-1／B-1／C-1 的管段
            table.querySelectorAll('tbody.segment-group').forEach(tb => {
                const mainRow = tb.querySelector('tr[data-segment-type="new"]');
                const el = mainRow ? mainRow.querySelector('.eval-grade-input') : null;
                const grade = el ? (el.value || '').trim() : '';
                if (!KEEP.includes(grade)) tb.remove();
            });

            if (!table.querySelector('tbody.segment-group')) {
                ws.innerHTML = '<p class="text-gray-500 p-4">本專案目前沒有評估分級為 A-1、B-1、C-1 的管段。</p>';
                return;
            }

            // 移除「段(拖曳)」欄與「操作」欄與「照片」欄（先以參照抓好表頭再移除，避免索引位移）
            const head0 = table.querySelector('thead tr');
            if (head0) {
                const cells = Array.from(head0.cells);
                const dragTh = cells[0];
                const actionTh = cells[cells.length - 1];
                const photoTh = cells.find(th => th.textContent.trim() === '照片');
                [dragTh, actionTh, photoTh].forEach(th => { if (th && th.parentNode) th.parentNode.removeChild(th); });
            }
            table.querySelectorAll('td.segment-drag-handle').forEach(td => td.remove());
            table.querySelectorAll('button[onclick^="deleteRow"]').forEach(b => {
                const td = b.closest('td');
                if (td) td.remove();
            });
            // 移除照片欄儲存格
            table.querySelectorAll('.photo-upload-input').forEach(el => {
                const td = el.closest('td');
                if (td) td.remove();
            });

            // 設為唯讀、移除上傳/移除照片按鈕與拖曳把手
            table.querySelectorAll('.btn-upload, .btn-remove, input[type="file"], .anomaly-drag-handle').forEach(el => el.remove());
            table.querySelectorAll('input, select, textarea').forEach(el => {
                el.setAttribute('readonly', 'readonly');
                el.setAttribute('disabled', 'disabled');
                el.style.pointerEvents = 'none';
            });

            // 新增「修繕建議」欄（表頭 + 各管段一格，可自行輸入）
            if (head0) {
                const th = document.createElement('th');
                th.rowSpan = 3;
                th.className = 'col-desc text-center';
                th.textContent = '修繕建議';
                head0.appendChild(th);
            }
            table.querySelectorAll('tbody.segment-group').forEach(tb => {
                const mainRow = tb.querySelector('tr[data-segment-type="new"]');
                if (!mainRow) return;
                const rowCount = tb.querySelectorAll('tr.anomaly-row').length;
                const gid = tb.dataset.groupId;
                const val = (repairAdviceData[activeProjectId] && repairAdviceData[activeProjectId][gid]) || '';
                const td = document.createElement('td');
                td.rowSpan = rowCount;
                td.className = 'p-0 align-middle';
                td.innerHTML = `<textarea class="w-full h-full min-h-[60px] p-2 text-sm border-0 outline-none resize-none focus:ring-2 focus:ring-blue-500 bg-yellow-50" placeholder="請輸入修繕建議" oninput="saveRepairAdvice('${gid}', this.value)">${val.replace(/</g,'&lt;')}</textarea>`;
                mainRow.appendChild(td);
            });

            ws.innerHTML = '';
            const wrap = document.createElement('div');
            wrap.className = 'overflow-x-auto';
            wrap.appendChild(table);
            ws.appendChild(wrap);
        }

        // ===== 水理計算 =====
        // 依原管徑查板帶高度（同 Excel VLOOKUP 近似）：<200→5.5、200~349→8、≥350→13
        function lookupBandHeight(d1) {
            const c = parseFloat(d1);
            if (!isFinite(c)) return '';
            if (c >= 350) return 13;
            if (c >= 200) return 8;
            return 5.5;
        }
        // 流量比→水深比對照表（Excel U2:V25，近似查找：取 ≤ 值的最大者）
        const DEPTH_RATIO_TABLE = [[0,0],[0.005,0.05],[0.021,0.1],[0.049,0.15],[0.088,0.2],[0.137,0.25],[0.196,0.3],[0.25,0.341],[0.3,0.376],[0.334,0.398],[0.35,0.408],[0.4,0.44],[0.45,0.47],[0.5,0.5],[0.55,0.529],[0.6,0.558],[0.65,0.587],[0.7,0.616],[0.75,0.646],[0.8,0.677],[0.85,0.708],[0.9,0.742],[0.95,0.778],[1,0.82]];
        function lookupDepthRatio(ratio) {
            if (!isFinite(ratio)) return null;
            let res = null;
            for (const [k, v] of DEPTH_RATIO_TABLE) {
                if (ratio >= k) res = v; else break;
            }
            return res;
        }

        // 取出某管段（tbody）的統計表基本資料
        function getSegmentInfoForHydraulic(tbody) {
            const mainRow = tbody.querySelector('tr[data-segment-type="new"]');
            if (!mainRow) return null;
            const info = { up: '', down: '', diameter: '', length: '' };
            Array.from(mainRow.children).forEach(td => {
                if (td.tagName !== 'TD') return;
                const t = classifyCoreCell(td);
                const el = td.querySelector('input, select');
                const v = el ? el.value : '';
                if (t === 'up') info.up = v;
                else if (t === 'down') info.down = v;
                else if (t === 'diameter') info.diameter = v;
                else if (t === 'length') info.length = v;
            });
            const gradeEl = mainRow.querySelector('.eval-grade-input');
            info.grade = gradeEl ? (gradeEl.value || '').trim() : '';
            return info;
        }

        // 計算單一管段水理，回傳所有欄位數值
        function computeHydraulic(seg, saved) {
            const C = parseFloat(seg.diameter);
            const L = parseFloat(seg.length);
            const H = parseFloat(saved.H);
            const U = parseFloat(saved.U);
            const D = parseFloat(saved.D);
            const N1 = parseFloat(saved.N1);
            const N2 = parseFloat(saved.N2);
            const r = { E: '', i: '', K: '', L08: '', N05: '', O08: '', P: '' };
            if (isFinite(C) && isFinite(H)) r.E = Math.round(C - 2 * H);
            // U 或 D 輸入 "-"（或 0/空白）代表無數據，後續計算欄位呈現「無數據」
            const rawU = (saved.U === undefined ? '' : String(saved.U).trim());
            const rawD = (saved.D === undefined ? '' : String(saved.D).trim());
            const noData = rawU === '-' || rawD === '-' || rawU === '' || rawD === '' || U === 0 || D === 0 || !isFinite(U) || !isFinite(D);
            if (noData) {
                r.noData = true;
                return r;
            }
            let iVal = NaN;
            if (isFinite(U) && isFinite(D) && isFinite(L) && L !== 0) { iVal = Math.abs(U - D) / L; r.i = iVal; }
            const E = r.E;
            if (isFinite(iVal) && iVal > 0) {
                const sqrtI = Math.sqrt(iVal);
                if (isFinite(C) && isFinite(N1) && N1 !== 0) {
                    const R05 = 0.25 * C / 1000, A05 = 0.3927 * Math.pow(C/1000, 2);
                    const R08 = 0.3042 * C / 1000, A08 = 0.6736 * Math.pow(C/1000, 2);
                    r.K = 86400 * A05 * (1/N1) * Math.pow(R05, 2/3) * sqrtI;
                    r.L08 = 86400 * A08 * (1/N1) * Math.pow(R08, 2/3) * sqrtI;
                }
                if (isFinite(E) && isFinite(N2) && N2 !== 0) {
                    const R05e = 0.25 * E / 1000, A05e = 0.3927 * Math.pow(E/1000, 2);
                    const R08e = 0.3042 * E / 1000, A08e = 0.6736 * Math.pow(E/1000, 2);
                    r.N05 = 86400 * A05e * (1/N2) * Math.pow(R05e, 2/3) * sqrtI;
                    r.O08 = 86400 * A08e * (1/N2) * Math.pow(R08e, 2/3) * sqrtI;
                }
                if (isFinite(r.K) && isFinite(r.N05) && r.N05 !== 0) {
                    const p = lookupDepthRatio(r.K / (2 * r.N05));
                    if (p !== null) r.P = p;
                }
            }
            return r;
        }

        function fmt(v, dp) {
            if (v === '' || v === null || v === undefined || !isFinite(v)) return '';
            return Number(v).toFixed(dp);
        }

            const KEEP = ['A-1', 'B-1', 'C-1'];
            const segs = [];
            src.querySelectorAll('tbody.segment-group').forEach(tb => {
                const info = getSegmentInfoForHydraulic(tb);
                if (info && KEEP.includes(info.grade)) segs.push({ gid: tb.dataset.groupId, info });
            });

            if (segs.length === 0) {
                ws.innerHTML = '<p class="text-gray-500 p-4">本專案目前沒有評估分級為 A-1、B-1、C-1 的管段。</p>';
                return;
            }

            if (!hydraulicData[activeProjectId]) hydraulicData[activeProjectId] = {};

            const th = (t) => `<th class="border border-gray-400 px-2 py-1 bg-gray-100 text-sm whitespace-nowrap">${t}</th>`;
            let html = '<div class="overflow-x-auto"><table id="hydraulicTable" class="border-collapse text-center text-sm">'
                + '<thead><tr>'
                + th('人孔編號<br>(上游)') + th('人孔編號<br>(下游)') + th('原管徑<br>D1(mm)') + th('板帶高度<br>H(mm)')
                + th('修繕後管徑<br>D2(mm)') + th('上游渠底<br>高程U(m)') + th('下游渠底<br>高程D(m)') + th('檢視長度<br>L(m)')
                + th('坡度 S(%)') + th('粗糙係數<br>N1(修繕前)') + th('0.5D流量<br>前(CMD)') + th('0.8D流量<br>前(CMD)')
                + th('粗糙係數<br>N2(修繕後)') + th('0.5D流量<br>後(CMD)') + th('0.8D流量<br>後(CMD)') + th('0.5D<br>水深比')
                + '</tr></thead><tbody>';

            segs.forEach(({ gid, info }) => {
                const saved = hydraulicData[activeProjectId][gid] || {};
                if (saved.H === undefined || saved.H === '') saved.H = lookupBandHeight(info.diameter);
                if (saved.N1 === undefined || saved.N1 === '') saved.N1 = 0.017;
                if (saved.N2 === undefined || saved.N2 === '') saved.N2 = 0.010;
                hydraulicData[activeProjectId][gid] = saved;

                const tdRO = (v) => `<td class="border border-gray-400 px-2 py-1 bg-gray-50 whitespace-nowrap">${v ?? ''}</td>`;
                const inp = (field, val, step) => `<td class="border border-gray-400 p-0"><input type="number" ${step?`step="${step}"`:''} value="${val ?? ''}" class="w-24 px-2 py-1 text-center bg-yellow-50 outline-none focus:ring-2 focus:ring-cyan-500" oninput="updateHydraulic('${gid}','${field}',this.value)"></td>`;
                const tdCalc = (cls) => `<td class="border border-gray-400 px-2 py-1 bg-white whitespace-nowrap ${cls}"></td>`;

                html += `<tr data-gid="${gid}">`
                    + tdRO(info.up) + tdRO(info.down) + tdRO(info.diameter)
                    + inp('H', saved.H, '0.1')
                    + tdCalc('h-E') + inp('U', saved.U, '0.001') + inp('D', saved.D, '0.001') + tdRO(info.length)
                    + tdCalc('h-i') + inp('N1', saved.N1, '0.001') + tdCalc('h-K') + tdCalc('h-L08')
                    + inp('N2', saved.N2, '0.001') + tdCalc('h-N05') + tdCalc('h-O08') + tdCalc('h-P')
                    + '</tr>';
            });
            html += '</tbody></table></div>';
            html += '<p class="text-gray-500 text-xs mt-3">說明：灰底欄位由統計表帶入（唯讀）；黃底欄位可自行輸入；坡度 i、修繕後管徑、各流量與水深比皆依水理表公式自動計算。坡度 S =(上游渠底高程U − 下游渠底高程D) / 檢視長度L。</p>';
            ws.innerHTML = html;

            segs.forEach(({ gid, info }) => recalcHydraulicRow(gid, info));
        }

        function recalcHydraulicRow(gid, info) {
            const tr = document.querySelector(`#hydraulicTable tr[data-gid="${gid}"]`);
            if (!tr) return;
            const saved = hydraulicData[activeProjectId][gid] || {};
            const r = computeHydraulic(info, saved);
            if (r.noData) {
                ['.h-i', '.h-K', '.h-L08', '.h-N05', '.h-O08', '.h-P'].forEach(sel => {
                    const cell = tr.querySelector(sel);
                    if (cell) cell.textContent = '無數據';
                });
                tr.querySelector('.h-E').textContent = fmt(r.E, 0);
                return;
            }
            tr.querySelector('.h-E').textContent = fmt(r.E, 0);
            tr.querySelector('.h-i').textContent = (r.i === '' ? '' : (Number(r.i) * 100).toFixed(3));
            tr.querySelector('.h-K').textContent = fmt(r.K, 1);
            tr.querySelector('.h-L08').textContent = fmt(r.L08, 1);
            tr.querySelector('.h-N05').textContent = fmt(r.N05, 1);
            tr.querySelector('.h-O08').textContent = fmt(r.O08, 1);
            tr.querySelector('.h-P').textContent = (r.P === '' ? '' : Number(r.P).toFixed(3));
        }

            const tb = panel ? panel.querySelector(`tbody[data-group-id="${gid}"]`) : null;
            const info = tb ? getSegmentInfoForHydraulic(tb) : null;
            if (info) recalcHydraulicRow(gid, info);
            scheduleAutoSave();
        }

        function generateSummaryTable() {
            const summaryData = {};
            const panel = document.querySelector(`#panel-${activeProjectId}`);
            if (!panel) return;

            const rows = panel.querySelectorAll('tr[data-segment-type="new"]');
            
            rows.forEach(mainRow => {
                const inputs = mainRow.querySelectorAll('input, select');
                const projectLabel = inputs[0]?.value || '未命名標別';
                const segmentLength = parseFloat(inputs[7]?.value) || 0;
                const diameter = parseFloat(inputs[8]?.value) || 0;
                const groupId = mainRow.dataset.groupId;
                const totalSegmentLength = segmentTotalLengths[activeProjectId]?.[groupId] || 0;
                
                if (!summaryData[projectLabel]) {
                    summaryData[projectLabel] = {
                        total: { '150~300': 0, '300~700': 0, '700+': 0 },
                        abnormal: { '150~300': 0, '300~700': 0, '700+': 0 }
                    };
                }

                const allGroupRows = panel.querySelectorAll(`tr[data-group-id="${groupId}"]`);
                let isAbnormal = false;
                allGroupRows.forEach(row => {
                    const gradeInput = row.querySelector('.eval-grade-input');
                    if (gradeInput && gradeInput.value.trim() !== '') {
                        isAbnormal = true;
                    }
                });

                let sizeCategory = '';
                if (diameter >= 150 && diameter < 300) sizeCategory = '150~300';
                else if (diameter >= 300 && diameter < 700) sizeCategory = '300~700';
                else if (diameter >= 700) sizeCategory = '700+';

                if (sizeCategory) {
                    summaryData[projectLabel].total[sizeCategory] += totalSegmentLength;
                    if (isAbnormal) {
                        summaryData[projectLabel].abnormal[sizeCategory] += segmentLength;
                    }
                }
            });

            if (!abnormalLengthData[activeProjectId]) abnormalLengthData[activeProjectId] = {};

        async function exportDiagramAsJPEG() {
            const diagram = document.getElementById('diagramContent');
            const workspace = document.getElementById('diagramWorkspace');
            if (!diagram) return;

            const elsToHide = diagram.querySelectorAll('.btn-remove-diagram-photo, input[type="file"], .photo-placeholder');
            elsToHide.forEach(el => {
                el.dataset.oldDisplay = el.style.display;
                el.style.display = 'none';
            });

            // html2canvas 無法正確換行/渲染 textarea，匯出前暫時換成會自動換行、透明底、無邊框的 div，融入粉色標題列
            const nameTa = diagram.querySelector('#diagram-project-name');
            let nameDiv = null;
            if (nameTa) {
                const cs = window.getComputedStyle(nameTa);
                nameDiv = document.createElement('div');
                nameDiv.textContent = nameTa.value;
                nameDiv.style.width = nameTa.offsetWidth + 'px';
                nameDiv.style.font = cs.font;
                nameDiv.style.fontWeight = cs.fontWeight;
                nameDiv.style.lineHeight = cs.lineHeight;
                nameDiv.style.padding = cs.padding;
                nameDiv.style.whiteSpace = 'pre-wrap';
                nameDiv.style.wordBreak = 'break-word';
                nameDiv.style.textAlign = 'left';
                nameDiv.style.background = 'transparent';
                nameDiv.style.border = 'none';
                nameDiv.style.color = cs.color;
                nameTa.style.display = 'none';
                nameTa.parentNode.insertBefore(nameDiv, nameTa.nextSibling);
            }

            const originalScrollTop = workspace.scrollTop;
            const originalScrollLeft = workspace.scrollLeft;
            workspace.scrollTop = 0;
            workspace.scrollLeft = 0;

            const originalBodyOverflow = document.body.style.overflow;
            const originalWorkspaceOverflow = workspace.style.overflow;
            const originalWorkspaceHeight = workspace.style.height;

            document.body.style.overflow = 'visible';
            workspace.style.overflow = 'visible';
            workspace.style.height = 'auto';

            try {
                await new Promise(resolve => setTimeout(resolve, 100));
                
                const canvas = await html2canvas(diagram, {
                    scale: 2,
                    useCORS: true,
                    backgroundColor: '#ffffff',
                    scrollY: 0,
                    scrollX: 0
                });
                const imgData = canvas.toDataURL('image/jpeg', 0.9);
                const link = document.createElement('a');
                link.download = '管段示意圖.jpg';
                link.href = imgData;
                link.click();
                showMessage('圖片已成功匯出');
            } catch (err) {
                console.error(err);
                showMessage('匯出圖片失敗', true);
            } finally {
                document.body.style.overflow = originalBodyOverflow;
                workspace.style.overflow = originalWorkspaceOverflow;
                workspace.style.height = originalWorkspaceHeight;
                workspace.scrollTop = originalScrollTop;
                workspace.scrollLeft = originalScrollLeft;

                elsToHide.forEach(el => {
                    el.style.display = el.dataset.oldDisplay || '';
                });

                if (nameTa) {
                    nameTa.style.display = '';
                    if (nameDiv && nameDiv.parentNode) nameDiv.parentNode.removeChild(nameDiv);
                }
            }
        }

        window.onload = initApp;

        // 退出畫面時自動存檔（切換分頁、最小化、關閉視窗皆會觸發）
        document.addEventListener('visibilitychange', () => {

        });

        window.addEventListener('beforeunload', saveToFirestoreBeacon);

        // 變更後自動存檔（保險：避免退出當下的非同步寫入來不及送達）
        document.addEventListener('input', (e) => {
            if (e.target.closest && e.target.closest('.project-panel')) scheduleAutoSave();
        });
        document.addEventListener('change', (e) => {
